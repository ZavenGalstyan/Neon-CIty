<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON CITY — Profile</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="select-screen profile-page">
  <div class="bg-grid"></div>
  <div class="scanlines"></div>

  <!-- ── Site Navbar ───────────────────────────────────────── -->
  <nav class="site-nav">
    <a href="index.html" class="site-nav__logo">NEON CITY</a>
    <div id="siteNav" class="site-nav__controls"></div>
  </nav>

  <!-- ── Profile Layout ────────────────────────────────────── -->
  <div class="profile-layout">

    <!-- Hero header -->
    <div class="profile-hero-card">
      <div class="profile-hero-left">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar-ring"></div>
          <div class="profile-avatar-inner">◈</div>
        </div>
        <div class="profile-hero-info">
          <h1 class="profile-username" id="profileName">—</h1>
          <div class="profile-hero-meta">
            <span class="profile-badge" id="heroLevel">LV 1</span>
            <span class="profile-badge profile-badge--tier" id="heroTier">IRON</span>
          </div>
        </div>
      </div>
      <button class="profile-logout-btn" id="profileLogout">LOGOUT</button>
    </div>

    <!-- Battle pass root -->
    <div id="bpRoot"></div>

  </div>

  <script src="js/auth.js"></script>
  <script src="js/battlepass.js"></script>
  <script>
    if (!Auth.isLoggedIn()) window.location.href = 'login.html';

    Auth.mountNavbar();

    const session = Auth.getSession();
    document.getElementById('profileName').textContent = session.name;

    /* Mount battle pass */
    BattlePass.mount(document.getElementById('bpRoot'));

    /* Sync hero badges with BP data */
    const bp   = BattlePass.loadBP();
    const tier = BattlePass.getTier(bp.level);
    document.getElementById('heroLevel').textContent = `LV ${bp.level}`;
    document.getElementById('heroTier').textContent  = tier.name;
    document.getElementById('heroTier').style.color  = tier.color;
    document.getElementById('heroTier').style.borderColor = `${tier.color}55`;

    document.getElementById('profileLogout').addEventListener('click', Auth.logout);
  </script>
</body>
</html>
