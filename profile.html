<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DASH DREAD — Profile</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/social.css">
  <script>try{if(localStorage.getItem('nc_theme')==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}</script>
  <style>
    /* ═══ Feedback Button ═══ */
    .profile-feedback-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      background: linear-gradient(135deg, rgba(0,240,255,0.08) 0%, rgba(170,100,255,0.06) 100%);
      border: 1px solid rgba(0,240,255,0.3);
      color: #44EEFF;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }
    .profile-feedback-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent, rgba(0,240,255,0.12), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .profile-feedback-btn:hover {
      background: linear-gradient(135deg, rgba(0,240,255,0.16) 0%, rgba(170,100,255,0.12) 100%);
      border-color: rgba(0,240,255,0.6);
      color: #88FFFF;
      box-shadow: 0 0 22px rgba(0,240,255,0.22), 0 4px 16px rgba(0,0,0,0.3);
      transform: translateY(-1px);
    }
    .profile-feedback-btn:hover::before { opacity: 1; }
    .profile-feedback-btn:active { transform: scale(0.97) translateY(0); }
    .profile-feedback-btn svg { flex-shrink: 0; }

    /* ═══ Report Button Styling ═══ */
    .profile-report-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.14em;
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
      background: rgba(255,170,68,0.08);
      border: 1px solid rgba(255,170,68,0.35);
      color: #DDAA44;
      transition: all 0.22s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .profile-report-btn:hover {
      background: rgba(255,170,68,0.16);
      border-color: rgba(255,170,68,0.55);
      color: #FFBB55;
      box-shadow: 0 0 20px rgba(255,170,68,0.2);
    }
    .profile-report-btn:active {
      transform: scale(0.97);
    }

    /* ═══ Report Modal — Premium Moderation UI ═══ */
    .rpt-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2,2,12,0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: rptFadeIn 0.25s ease;
    }
    @keyframes rptFadeIn { from { opacity: 0; } to { opacity: 1; } }
    .rpt-backdrop[hidden] { display: none !important; }

    .rpt-box {
      background: linear-gradient(155deg, rgba(16,12,32,0.99) 0%, rgba(10,8,22,0.99) 100%);
      border: 1px solid rgba(255,170,68,0.35);
      border-radius: 20px;
      padding: 32px 36px 28px;
      max-width: 460px;
      width: 100%;
      box-shadow:
        0 0 60px rgba(255,170,68,0.1),
        0 0 30px rgba(255,136,68,0.06),
        0 30px 70px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(255,255,255,0.04);
      animation: rptSlideIn 0.3s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      overflow: hidden;
    }
    .rpt-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(180deg, rgba(255,170,68,0.06) 0%, transparent 100%);
      pointer-events: none;
      border-radius: 20px 20px 0 0;
    }
    @keyframes rptSlideIn {
      from { opacity: 0; transform: scale(0.94) translateY(12px); }
      to { opacity: 1; transform: none; }
    }

    /* Header */
    .rpt-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
      position: relative;
    }
    .rpt-icon-wrap {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(255,170,68,0.15) 0%, rgba(255,136,68,0.08) 100%);
      border: 1px solid rgba(255,170,68,0.3);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .rpt-icon {
      font-size: 22px;
      color: #FFAA44;
      filter: drop-shadow(0 0 8px rgba(255,170,68,0.5));
    }
    .rpt-header-text {
      flex: 1;
    }
    .rpt-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #FFAA44;
      margin: 0 0 6px 0;
      text-shadow: 0 0 18px rgba(255,170,68,0.4);
    }
    .rpt-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      line-height: 1.4;
      margin: 0;
    }

    /* Form fields */
    .rpt-field {
      margin-bottom: 20px;
    }
    .rpt-lbl {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: rgba(255,170,68,0.7);
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .rpt-lbl::before {
      content: '';
      width: 4px;
      height: 4px;
      background: #FFAA44;
      border-radius: 50%;
      box-shadow: 0 0 6px #FFAA44;
    }

    .rpt-inp, .rpt-area {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      outline: none;
      transition: all 0.25s ease;
      box-sizing: border-box;
    }
    .rpt-inp::placeholder, .rpt-area::placeholder {
      color: rgba(255,255,255,0.28);
    }
    .rpt-inp:hover, .rpt-area:hover {
      border-color: rgba(255,170,68,0.25);
      background: rgba(255,255,255,0.04);
    }
    .rpt-inp:focus, .rpt-area:focus {
      border-color: rgba(255,170,68,0.5);
      background: rgba(255,170,68,0.04);
      box-shadow: 0 0 20px rgba(255,170,68,0.1), inset 0 0 20px rgba(255,170,68,0.02);
    }
    .rpt-area {
      resize: vertical;
      min-height: 110px;
      line-height: 1.5;
    }

    /* Error */
    .rpt-err {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #FF6666;
      margin-top: -8px;
      margin-bottom: 12px;
      display: none;
      padding-left: 12px;
      border-left: 2px solid #FF6666;
    }

    /* Buttons */
    .rpt-btns {
      display: flex;
      gap: 14px;
      justify-content: flex-end;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .rpt-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      padding: 12px 24px;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.22s ease;
    }
    .rpt-btn--cancel {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.5);
    }
    .rpt-btn--cancel:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.25);
      color: #fff;
    }
    .rpt-btn--send {
      background: linear-gradient(135deg, rgba(255,170,68,0.2) 0%, rgba(255,136,68,0.15) 100%);
      border-color: rgba(255,170,68,0.45);
      color: #FFAA44;
      box-shadow: 0 0 15px rgba(255,170,68,0.15);
    }
    .rpt-btn--send:hover {
      background: linear-gradient(135deg, rgba(255,170,68,0.3) 0%, rgba(255,136,68,0.22) 100%);
      border-color: rgba(255,170,68,0.65);
      color: #FFCC66;
      box-shadow: 0 0 25px rgba(255,170,68,0.25);
      transform: translateY(-1px);
    }
    .rpt-btn--send:active {
      transform: translateY(0);
    }
    .rpt-btn--send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
      box-shadow: none;
    }

    /* ═══ Light Mode — Report Button ═══ */
    html[data-theme="light"] .profile-report-btn {
      background: rgba(180,120,40,0.08);
      border-color: rgba(180,120,40,0.4);
      color: #996622;
    }
    html[data-theme="light"] .profile-report-btn:hover {
      background: rgba(180,120,40,0.15);
      border-color: rgba(180,120,40,0.6);
      color: #885511;
      box-shadow: 0 0 18px rgba(180,120,40,0.2);
    }

    /* ═══ Light Mode — Report Modal ═══ */
    html[data-theme="light"] .rpt-backdrop {
      background: rgba(220,230,245,0.88);
    }
    html[data-theme="light"] .rpt-box {
      background: linear-gradient(155deg, rgba(255,255,255,0.99) 0%, rgba(248,250,255,0.99) 100%);
      border-color: rgba(180,120,40,0.35);
      box-shadow:
        0 0 50px rgba(180,120,40,0.1),
        0 25px 60px rgba(0,30,60,0.2),
        inset 0 1px 0 rgba(255,255,255,0.9);
    }
    html[data-theme="light"] .rpt-box::before {
      background: linear-gradient(180deg, rgba(180,120,40,0.06) 0%, transparent 100%);
    }
    html[data-theme="light"] .rpt-icon-wrap {
      background: linear-gradient(135deg, rgba(180,120,40,0.12) 0%, rgba(180,120,40,0.06) 100%);
      border-color: rgba(180,120,40,0.3);
    }
    html[data-theme="light"] .rpt-icon {
      color: #996622;
      filter: drop-shadow(0 0 6px rgba(180,120,40,0.4));
    }
    html[data-theme="light"] .rpt-title {
      color: #885511;
      text-shadow: 0 0 15px rgba(180,120,40,0.3);
    }
    html[data-theme="light"] .rpt-sub {
      color: rgba(30,40,60,0.6);
    }
    html[data-theme="light"] .rpt-lbl {
      color: rgba(140,100,40,0.85);
    }
    html[data-theme="light"] .rpt-lbl::before {
      background: #996622;
      box-shadow: 0 0 6px rgba(180,120,40,0.5);
    }
    html[data-theme="light"] .rpt-inp,
    html[data-theme="light"] .rpt-area {
      background: rgba(0,20,40,0.03);
      border-color: rgba(0,30,60,0.15);
      color: #1a2a40;
    }
    html[data-theme="light"] .rpt-inp::placeholder,
    html[data-theme="light"] .rpt-area::placeholder {
      color: rgba(30,50,80,0.4);
    }
    html[data-theme="light"] .rpt-inp:hover,
    html[data-theme="light"] .rpt-area:hover {
      border-color: rgba(180,120,40,0.3);
      background: rgba(0,20,40,0.04);
    }
    html[data-theme="light"] .rpt-inp:focus,
    html[data-theme="light"] .rpt-area:focus {
      border-color: rgba(180,120,40,0.5);
      background: rgba(180,120,40,0.04);
      box-shadow: 0 0 18px rgba(180,120,40,0.1);
    }
    html[data-theme="light"] .rpt-err {
      color: #cc4444;
      border-left-color: #cc4444;
    }
    html[data-theme="light"] .rpt-btns {
      border-top-color: rgba(0,30,60,0.08);
    }
    html[data-theme="light"] .rpt-btn--cancel {
      background: rgba(0,30,60,0.04);
      border-color: rgba(0,30,60,0.15);
      color: rgba(30,50,80,0.6);
    }
    html[data-theme="light"] .rpt-btn--cancel:hover {
      background: rgba(0,30,60,0.08);
      border-color: rgba(0,30,60,0.25);
      color: #1a2a40;
    }
    html[data-theme="light"] .rpt-btn--send {
      background: linear-gradient(135deg, rgba(180,120,40,0.18) 0%, rgba(180,120,40,0.12) 100%);
      border-color: rgba(180,120,40,0.45);
      color: #885511;
      box-shadow: 0 0 12px rgba(180,120,40,0.12);
    }
    html[data-theme="light"] .rpt-btn--send:hover {
      background: linear-gradient(135deg, rgba(180,120,40,0.28) 0%, rgba(180,120,40,0.18) 100%);
      border-color: rgba(180,120,40,0.6);
      color: #774400;
      box-shadow: 0 0 20px rgba(180,120,40,0.2);
    }

    /* ═══ Feedback Modal ═══ */
    .fbk-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2,2,14,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fbkFadeIn 0.22s ease;
    }
    @keyframes fbkFadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fbk-backdrop[hidden] { display: none !important; }

    .fbk-box {
      background: linear-gradient(158deg, rgba(8,6,22,0.98) 0%, rgba(5,4,16,0.99) 100%);
      border: 1px solid rgba(0,240,255,0.2);
      border-radius: 24px;
      padding: 36px 38px 32px;
      max-width: 500px;
      width: 100%;
      box-shadow:
        0 0 80px rgba(0,240,255,0.08),
        0 0 40px rgba(170,100,255,0.06),
        0 40px 80px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.05);
      animation: fbkSlideIn 0.28s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      overflow: hidden;
    }
    /* Top glow strip */
    .fbk-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(0,240,255,0.5) 30%, rgba(170,100,255,0.5) 70%, transparent 100%);
    }
    /* Ambient inner glow */
    .fbk-box::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(180deg, rgba(0,240,255,0.04) 0%, transparent 100%);
      pointer-events: none;
    }
    @keyframes fbkSlideIn {
      from { opacity: 0; transform: scale(0.93) translateY(14px); }
      to   { opacity: 1; transform: none; }
    }

    /* Header */
    .fbk-header {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }
    .fbk-icon-wrap {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(0,240,255,0.12) 0%, rgba(170,100,255,0.08) 100%);
      border: 1px solid rgba(0,240,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(0,240,255,0.1);
      animation: fbkIconPulse 3s ease-in-out infinite;
    }
    @keyframes fbkIconPulse {
      0%,100% { box-shadow: 0 0 16px rgba(0,240,255,0.08); }
      50%      { box-shadow: 0 0 28px rgba(0,240,255,0.18); }
    }
    .fbk-icon-svg {
      color: #44EEFF;
      filter: drop-shadow(0 0 8px rgba(0,240,255,0.6));
    }
    .fbk-header-text { flex: 1; }
    .fbk-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #fff;
      margin: 0 0 7px;
      text-shadow: 0 0 24px rgba(0,240,255,0.3);
    }
    .fbk-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      line-height: 1.45;
      margin: 0;
    }
    .fbk-close {
      position: absolute;
      top: 0; right: 0;
      width: 32px; height: 32px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.18s;
      z-index: 2;
    }
    .fbk-close:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.25);
      color: #fff;
    }

    /* Divider */
    .fbk-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    /* Type selector tabs */
    .fbk-type-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }
    .fbk-type-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px 16px;
      border-radius: 16px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
      transition: all 0.28s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
    }
    .fbk-type-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      transition: opacity 0.28s;
    }
    .fbk-type-btn:hover { transform: translateY(-2px); }

    /* Proposal */
    .fbk-type-btn--proposal::before {
      background: linear-gradient(135deg, rgba(170,100,255,0.1) 0%, rgba(255,215,0,0.06) 100%);
    }
    .fbk-type-btn--proposal:hover {
      border-color: rgba(170,100,255,0.4);
      box-shadow: 0 8px 32px rgba(170,100,255,0.12);
    }
    .fbk-type-btn--proposal:hover::before { opacity: 1; }
    .fbk-type-btn--proposal.fbk-type-active {
      border-color: rgba(170,100,255,0.6);
      background: linear-gradient(135deg, rgba(170,100,255,0.12) 0%, rgba(255,215,0,0.06) 100%);
      box-shadow: 0 0 40px rgba(170,100,255,0.18), 0 8px 24px rgba(0,0,0,0.3);
    }
    .fbk-type-btn--proposal.fbk-type-active::before { opacity: 1; }

    /* Problem */
    .fbk-type-btn--problem::before {
      background: linear-gradient(135deg, rgba(255,68,102,0.1) 0%, rgba(255,120,60,0.06) 100%);
    }
    .fbk-type-btn--problem:hover {
      border-color: rgba(255,68,102,0.4);
      box-shadow: 0 8px 32px rgba(255,68,102,0.12);
    }
    .fbk-type-btn--problem:hover::before { opacity: 1; }
    .fbk-type-btn--problem.fbk-type-active {
      border-color: rgba(255,68,102,0.6);
      background: linear-gradient(135deg, rgba(255,68,102,0.12) 0%, rgba(255,120,60,0.06) 100%);
      box-shadow: 0 0 40px rgba(255,68,102,0.18), 0 8px 24px rgba(0,0,0,0.3);
    }
    .fbk-type-btn--problem.fbk-type-active::before { opacity: 1; }

    .fbk-type-icon {
      font-size: 28px;
      line-height: 1;
      transition: transform 0.28s ease;
      position: relative;
      z-index: 1;
    }
    .fbk-type-btn:hover .fbk-type-icon { transform: scale(1.12); }
    .fbk-type-active .fbk-type-icon { transform: scale(1.08); }

    .fbk-type-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
      transition: color 0.25s;
    }
    .fbk-type-btn--proposal .fbk-type-label { color: rgba(200,160,255,0.6); }
    .fbk-type-btn--proposal.fbk-type-active .fbk-type-label,
    .fbk-type-btn--proposal:hover .fbk-type-label { color: #CC88FF; text-shadow: 0 0 12px rgba(170,100,255,0.5); }
    .fbk-type-btn--problem .fbk-type-label { color: rgba(255,150,150,0.6); }
    .fbk-type-btn--problem.fbk-type-active .fbk-type-label,
    .fbk-type-btn--problem:hover .fbk-type-label { color: #FF7788; text-shadow: 0 0 12px rgba(255,68,102,0.5); }

    .fbk-type-desc {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.3);
      text-align: center;
      line-height: 1.35;
      position: relative;
      z-index: 1;
    }

    /* Active indicator dot */
    .fbk-type-btn .fbk-active-dot {
      position: absolute;
      top: 10px; right: 10px;
      width: 6px; height: 6px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .fbk-type-btn--proposal .fbk-active-dot { background: #CC88FF; box-shadow: 0 0 8px #AA66FF; }
    .fbk-type-btn--problem  .fbk-active-dot { background: #FF7788; box-shadow: 0 0 8px #FF4466; }
    .fbk-type-active .fbk-active-dot { opacity: 1; }

    /* Form fields */
    .fbk-field {
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }
    .fbk-lbl {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: rgba(0,240,255,0.6);
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .fbk-lbl::before {
      content: '';
      width: 3px; height: 3px;
      border-radius: 50%;
      background: #44EEFF;
      box-shadow: 0 0 6px #44EEFF;
    }
    .fbk-inp, .fbk-area {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      outline: none;
      transition: all 0.22s ease;
      box-sizing: border-box;
    }
    .fbk-inp::placeholder, .fbk-area::placeholder { color: rgba(255,255,255,0.22); }
    .fbk-inp:hover, .fbk-area:hover {
      border-color: rgba(0,240,255,0.2);
      background: rgba(255,255,255,0.04);
    }
    .fbk-inp:focus, .fbk-area:focus {
      border-color: rgba(0,240,255,0.45);
      background: rgba(0,240,255,0.03);
      box-shadow: 0 0 22px rgba(0,240,255,0.08), inset 0 0 16px rgba(0,240,255,0.02);
    }
    .fbk-area {
      resize: vertical;
      min-height: 108px;
      line-height: 1.55;
    }

    /* Error */
    .fbk-err {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #FF6677;
      margin-bottom: 14px;
      display: none;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(255,68,102,0.06);
      border: 1px solid rgba(255,68,102,0.25);
      position: relative;
      z-index: 1;
    }

    /* Footer buttons */
    .fbk-footer {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      position: relative;
      z-index: 1;
    }
    .fbk-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.14em;
      padding: 13px 26px;
      border-radius: 11px;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      overflow: hidden;
    }
    .fbk-btn::before {
      content: '';
      position: absolute;
      top: -50%; left: -80%;
      width: 50%; height: 200%;
      background: linear-gradient(105deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: skewX(-15deg);
      opacity: 0;
      transition: opacity 0.22s;
    }
    .fbk-btn:hover::before { opacity: 1; animation: fbkShine 0.5s ease forwards; }
    @keyframes fbkShine { from { left: -80%; } to { left: 160%; } }

    .fbk-btn--cancel {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.45);
    }
    .fbk-btn--cancel:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.22);
      color: #fff;
    }
    .fbk-btn--submit {
      background: linear-gradient(135deg, rgba(0,240,255,0.15) 0%, rgba(170,100,255,0.1) 100%);
      border-color: rgba(0,240,255,0.4);
      color: #44EEFF;
      box-shadow: 0 0 18px rgba(0,240,255,0.12);
    }
    .fbk-btn--submit:hover:not(:disabled) {
      background: linear-gradient(135deg, rgba(0,240,255,0.25) 0%, rgba(170,100,255,0.18) 100%);
      border-color: rgba(0,240,255,0.65);
      color: #88FFFF;
      box-shadow: 0 0 30px rgba(0,240,255,0.22), 0 6px 20px rgba(0,0,0,0.3);
      transform: translateY(-1px);
    }
    .fbk-btn--submit:active:not(:disabled) { transform: translateY(0) scale(0.98); }
    .fbk-btn--submit:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ═══ Light Mode — Feedback Button ═══ */
    html[data-theme="light"] .profile-feedback-btn {
      background: linear-gradient(135deg, rgba(0,101,133,0.08) 0%, rgba(74,32,128,0.05) 100%);
      border-color: rgba(0,101,133,0.35);
      color: #006585;
    }
    html[data-theme="light"] .profile-feedback-btn:hover {
      background: linear-gradient(135deg, rgba(0,101,133,0.15) 0%, rgba(74,32,128,0.1) 100%);

      color: #004d66;
      box-shadow: 0 0 18px rgba(0,101,133,0.18);
    }

    /* ═══ Light Mode — Feedback Modal ═══ */
    html[data-theme="light"] .fbk-backdrop { background: rgba(210,225,242,0.88); }
    html[data-theme="light"] .fbk-box {
      background: linear-gradient(158deg, rgba(248,252,255,0.99) 0%, rgba(240,248,255,0.99) 100%);
      border-color: rgba(0,101,133,0.25);
      box-shadow: 0 0 60px rgba(0,101,133,0.08), 0 30px 70px rgba(0,30,60,0.18), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    html[data-theme="light"] .fbk-box::before {
      background: linear-gradient(90deg, transparent, rgba(0,101,133,0.3), rgba(74,32,128,0.3), transparent);
    }
    html[data-theme="light"] .fbk-box::after {
      background: linear-gradient(180deg, rgba(0,101,133,0.04) 0%, transparent 100%);
    }
    html[data-theme="light"] .fbk-icon-wrap {

      border-color: rgba(0,101,133,0.3);
    }

    html[data-theme="light"] .fbk-title { color: #050a15; text-shadow: none; }
    html[data-theme="light"] .fbk-sub { color: rgba(30,42,60,0.55); }
    html[data-theme="light"] .fbk-close { border-color: rgba(10,25,50,0.15); color: rgba(30,42,60,0.5); }
    html[data-theme="light"] .fbk-close:hover { background: rgba(10,25,50,0.06); color: #050a15; }
    html[data-theme="light"] .fbk-divider { background: linear-gradient(90deg, transparent, rgba(10,25,50,0.1), transparent); }
    html[data-theme="light"] .fbk-type-btn { background: rgba(10,25,50,0.03); border-color: rgba(10,25,50,0.12); }
    html[data-theme="light"] .fbk-type-btn--proposal:hover { border-color: rgba(74,32,128,0.45); box-shadow: 0 8px 24px rgba(74,32,128,0.1); }
    html[data-theme="light"] .fbk-type-btn--proposal.fbk-type-active { border-color: rgba(74,32,128,0.6); background: linear-gradient(135deg, rgba(74,32,128,0.08) 0%, rgba(255,215,0,0.04) 100%); box-shadow: 0 0 30px rgba(74,32,128,0.12); }
    html[data-theme="light"] .fbk-type-btn--problem:hover  { border-color: rgba(180,40,60,0.45); box-shadow: 0 8px 24px rgba(180,40,60,0.1); }
    html[data-theme="light"] .fbk-type-btn--problem.fbk-type-active  { border-color: rgba(180,40,60,0.6); background: linear-gradient(135deg, rgba(180,40,60,0.08) 0%, rgba(220,80,30,0.04) 100%); box-shadow: 0 0 30px rgba(180,40,60,0.12); }
    html[data-theme="light"] .fbk-type-btn--proposal .fbk-type-label { color: rgba(74,32,128,0.5); }
    html[data-theme="light"] .fbk-type-btn--proposal.fbk-type-active .fbk-type-label,
    html[data-theme="light"] .fbk-type-btn--proposal:hover .fbk-type-label { color: #5a2888; text-shadow: none; }
    html[data-theme="light"] .fbk-type-btn--problem .fbk-type-label  { color: rgba(180,40,60,0.5); }
    html[data-theme="light"] .fbk-type-btn--problem.fbk-type-active .fbk-type-label,
    html[data-theme="light"] .fbk-type-btn--problem:hover .fbk-type-label  { color: #a02030; text-shadow: none; }
    html[data-theme="light"] .fbk-type-desc { color: rgba(30,42,60,0.45); }
    html[data-theme="light"] .fbk-lbl { color: rgba(0,101,133,0.75); }
    html[data-theme="light"] .fbk-lbl::before { background: #006585; box-shadow: none; }
    html[data-theme="light"] .fbk-inp, html[data-theme="light"] .fbk-area {
      background: rgba(0,20,50,0.03);

    }
    html[data-theme="light"] .fbk-inp::placeholder, html[data-theme="light"] .fbk-area::placeholder { color: rgba(30,50,80,0.35); }

    html[data-theme="light"] .fbk-inp:focus, html[data-theme="light"] .fbk-area:focus { border-color: rgba(0,101,133,0.45); background: rgba(0,101,133,0.03); box-shadow: 0 0 16px rgba(0,101,133,0.08); }
    html[data-theme="light"] .fbk-err { color: #aa3344; background: rgba(180,40,60,0.06); border-color: rgba(180,40,60,0.25); }
    html[data-theme="light"] .fbk-footer { border-top-color: rgba(10,25,50,0.08); }
    html[data-theme="light"] .fbk-btn--cancel { background: rgba(10,25,50,0.04); border-color: rgba(10,25,50,0.14); color: rgba(30,50,80,0.55); }
    html[data-theme="light"] .fbk-btn--cancel:hover { background: rgba(10,25,50,0.08); border-color: rgba(10,25,50,0.25); color: #1a2a40; }
    html[data-theme="light"] .fbk-btn--submit { background: linear-gradient(135deg, rgba(0,101,133,0.14) 0%, rgba(74,32,128,0.1) 100%); border-color: rgba(0,101,133,0.45); color: #006585; box-shadow: 0 0 14px rgba(0,101,133,0.1); }
    html[data-theme="light"] .fbk-btn--submit:hover:not(:disabled) { background: linear-gradient(135deg, rgba(0,101,133,0.22) 0%, rgba(74,32,128,0.16) 100%); border-color: rgba(0,101,133,0.65); color: #004d66; box-shadow: 0 0 22px rgba(0,101,133,0.18); }

    /* ═══ Toast Notifications ═══ */
    .prof-toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 14px 28px;
      border-radius: 12px;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      z-index: 4000;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .prof-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .prof-toast--success {
      background: rgba(68,255,136,0.12);
      border: 1px solid rgba(68,255,136,0.35);
      color: #44FF88;
      box-shadow: 0 0 20px rgba(68,255,136,0.2);
    }
    .prof-toast--error {
      background: rgba(255,68,102,0.12);
      border: 1px solid rgba(255,68,102,0.35);
      color: #FF4466;
      box-shadow: 0 0 20px rgba(255,68,102,0.2);
    }

    /* Light mode toasts */
    html[data-theme="light"] .prof-toast--success {
      background: rgba(34,170,85,0.12);
      border-color: rgba(34,170,85,0.4);
      color: #117744;
      box-shadow: 0 0 18px rgba(34,170,85,0.15);

      background: rgba(200,60,80,0.12);

<body class="select-screen profile-page">
  <div class="bg-grid"></div>
  <div class="scanlines"></div>

  <!-- ── Site Navbar ───────────────────────────────────────── -->
  <nav class="site-nav">
    <a href="index.html" class="site-nav__logo"><img src="images/logo.png" alt="DASH DREAD" class="site-nav__logo-img"></a>
    <div id="siteNav" class="site-nav__controls"></div>
  </nav>

  <!-- ── Profile Layout ────────────────────────────────────── -->
  <div class="profile-layout">

    <!-- ── Hero card (renders immediately, values filled after fetch) ── -->
    <div class="profile-hero-card">

      <div class="profile-hero-left">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar-ring"></div>
          <div class="profile-avatar-inner">◈</div>
        </div>

        <div class="profile-hero-info">
          <!-- Name -->
          <h1 class="profile-username" id="profileName">—</h1>

          <!-- Level + tier badges -->
          <div class="profile-hero-meta">
            <span class="profile-badge skeleton-inline" id="heroLevel">LV —</span>
            <span class="profile-badge profile-badge--tier skeleton-inline" id="heroTier">———</span>
          </div>

          <!-- Stats row: NEX chip + XP chip -->
          <div class="profile-stats-row">

            <!-- NEX currency -->
            <div class="profile-stat-chip">
              <span class="profile-stat-icon">⬢</span>
              <div class="profile-stat-body">
                <span class="profile-stat-label">NEX</span>
                <span class="profile-stat-value skeleton-text" id="statNex">—</span>
              </div>
            </div>

            <!-- XP progress chip -->
            <div class="profile-stat-chip profile-stat-chip--xp">
              <span class="profile-stat-icon" style="color:var(--purple);text-shadow:0 0 10px rgba(204,136,255,0.6)">⬡</span>
              <div class="profile-stat-body profile-stat-body--xp">
                <div class="profile-stat-xp-top">
                  <span class="profile-stat-label">XP PROGRESS</span>
                  <span class="profile-stat-xp-nums skeleton-text" id="statXp">— / —</span>
                </div>
                <div class="profile-xp-track">
                  <div class="profile-xp-fill" id="statXpFill" style="width:0%"></div>
                </div>
                <span class="profile-stat-xp-sub skeleton-text" id="statXpSub">— XP to next level</span>
              </div>
            </div>

          </div>
        </div>
      </div>

      <div style="display:flex;flex-direction:row;gap:10px;align-items:center">
        <button id="adminPanelBtn" hidden
          style="
            font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:0.18em;
            padding:9px 18px;border-radius:10px;cursor:pointer;
            background:rgba(255,68,102,0.1);border:1px solid rgba(255,68,102,0.4);color:#FF4466;
            transition:all 0.18s;display:flex;align-items:center;gap:8px;
          "
          onmouseover="this.style.background='rgba(255,68,102,0.22)';this.style.borderColor='#FF4466';this.style.boxShadow='0 0 18px rgba(255,68,102,0.3)'"
          onmouseout="this.style.background='rgba(255,68,102,0.1)';this.style.borderColor='rgba(255,68,102,0.4)';this.style.boxShadow=''"
          onclick="window.location.href='admin.html'"
        >⚡ ADMIN PANEL</button>
        <button id="profileReportBtn" class="profile-report-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
            <line x1="4" y1="22" x2="4" y2="15"/>
          </svg>
          REPORT
        </button>
        <button id="profileFeedbackBtn" class="profile-feedback-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          FEEDBACK
        </button>
        <button class="profile-logout-btn" id="profileLogout">LOGOUT</button>
      </div>
    </div>

    <!-- ── Error banner (hidden until a fetch error) ─────────── -->

      <span id="profileErrorMsg"></span>

    </div>

    <!-- ── Battle pass (shows spinner until data arrives) ─────── -->
    <div id="bpRoot">
      <div class="bp-loading">
        <span class="auth-spinner" style="width:28px;height:28px;border-width:3px;border-color:rgba(68,238,255,0.15);border-top-color:var(--cyan)"></span>
        <span class="bp-loading-text">LOADING BATTLE PASS…</span>
      </div>
    </div>

  <!-- Feedback Modal -->
  <div class="fbk-backdrop" id="fbkModal" hidden>
    <div class="fbk-box">

      <!-- Header -->
      <div class="fbk-header">
        <div class="fbk-icon-wrap">
          <svg class="fbk-icon-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div class="fbk-header-text">
          <div class="fbk-title">PLAYER FEEDBACK</div>

        </div>
      </div>

      <div class="fbk-divider"></div>

      <div class="fbk-type-row">

          <div class="fbk-active-dot"></div>
          <span class="fbk-type-icon">💡</span>
          <span class="fbk-type-label">PROPOSAL</span>
          <span class="fbk-type-desc">Feature ideas &amp; suggestions</span>

          <span class="fbk-type-desc">Bugs &amp; issues you've found</span>

        </div>
      </div>

      <!-- Problem form -->
      <div id="fbkFormProblem" hidden>
        <div class="fbk-field">
          <label class="fbk-lbl" for="fbkProbTitle">TITLE</label>
          <input class="fbk-inp" id="fbkProbTitle" type="text" placeholder="Describe the issue briefly…" autocomplete="off">
        </div>
        <div class="fbk-field">
          <label class="fbk-lbl" for="fbkProbDesc">DESCRIPTION</label>

      <div class="fbk-footer">

      </div>

  <script src="js/auth.js"></script>

  <script>
    /* ── Guard ─────────────────────────────────────────────── */
    if (!Auth.isLoggedIn()) window.location.href = 'login.html';

    Auth.mountNavbar();
    if (Auth.isLoggedIn()) SocialUI.init();

    const session = Auth.getSession();

    /* Show name immediately from session while API loads */
    document.getElementById('profileName').textContent = session.name;
    document.getElementById('profileLogout').addEventListener('click', Auth.logout);

    /* Show Admin Panel button only for the Admin user */
    if (session.name === 'Admin') {
      document.getElementById('adminPanelBtn').hidden = false;
    }

    /* ── Load profile from API ─────────────────────────────── */
    async function loadProfile() {
      document.getElementById('profileError').hidden = true;

      try {
        // Use GET /profile/me (token-protected) for own profile — most reliable
        const data = await API.getProfile();
        renderProfile(data);
      } catch (err) {
        showError(err.message || 'Could not load profile. Is the server running?');
      }
    }

    /* ── Render all profile data ───────────────────────────── */
    function renderProfile(data) {
      const acct = data.account    || {};
      const bp   = data.battlePass || {};

      const tier    = BattlePass.getTier(acct.level ?? 1);
      const xpDone  = acct.xpInCurrentLevel      ?? 0;
      const xpNeeded= acct.xpNeededForNextLevel   ?? BattlePass.XP_PER_LEVEL;
      const xpLeft  = Math.max(0, xpNeeded - xpDone);
      const xpPct   = acct.level >= BattlePass.MAX_LEVEL
                        ? 100
                        : (acct.progressPercent ?? Math.min(100, (xpDone / xpNeeded) * 100));

      /* Hero badges */
      const lvlEl  = document.getElementById('heroLevel');
      const tierEl = document.getElementById('heroTier');
      lvlEl.classList.remove('skeleton-inline');
      lvlEl.textContent = `LV ${acct.level ?? '—'}`;
      tierEl.classList.remove('skeleton-inline');
      tierEl.textContent       = tier.name;
      tierEl.style.color       = tier.c2;
      tierEl.style.borderColor = `${tier.c2}44`;

      /* NEX */
      const nexEl = document.getElementById('statNex');
      nexEl.classList.remove('skeleton-text');
      nexEl.textContent = (data.nex ?? 0).toLocaleString();

      /* Account XP bar */
      const xpEl  = document.getElementById('statXp');
      const subEl = document.getElementById('statXpSub');
      xpEl.classList.remove('skeleton-text');
      subEl.classList.remove('skeleton-text');

      if ((acct.level ?? 0) >= BattlePass.MAX_LEVEL) {
        xpEl.textContent  = 'MAX LEVEL';
        subEl.textContent = 'You have reached the top!';
      } else {
        xpEl.textContent  = `${xpDone.toLocaleString()} / ${xpNeeded.toLocaleString()} XP`;
        subEl.textContent = `${xpLeft.toLocaleString()} XP to reach Level ${(acct.level ?? 0) + 1}`;
      }

      requestAnimationFrame(() => {
        document.getElementById('statXpFill').style.width = `${xpPct}%`;
      });

      /* Battle pass — pass the battlePass object directly */
      BattlePass.mount(document.getElementById('bpRoot'), bp);
    }

    /* ── Error state ───────────────────────────────────────── */
    function showError(msg) {
      /* Fallback: render battle pass from localStorage so page isn't blank */
      BattlePass.mount(document.getElementById('bpRoot'));

      const banner = document.getElementById('profileError');
      document.getElementById('profileErrorMsg').textContent = msg;
      banner.hidden = false;
    }

    document.getElementById('profileRetry').addEventListener('click', loadProfile);

    /* ── Kick off ──────────────────────────────────────────── */
    loadProfile();

    /* ── Report Modal ─────────────────────────────────────── */
    let _profToastTimer = null;
    function showProfToast(msg, type = 'success') {
      const el = document.getElementById('profToast');
      el.textContent = msg;
      el.className = `prof-toast prof-toast--${type} show`;
      clearTimeout(_profToastTimer);
      _profToastTimer = setTimeout(() => el.classList.remove('show'), 3200);
    }

    document.getElementById('profileReportBtn').addEventListener('click', () => {
      document.getElementById('rptName').value = '';
      document.getElementById('rptReason').value = '';
      document.getElementById('rptErr').style.display = 'none';
      document.getElementById('rptModal').hidden = false;
      setTimeout(() => document.getElementById('rptName').focus(), 60);
    });

    document.getElementById('rptCancel').addEventListener('click', () => {
      document.getElementById('rptModal').hidden = true;
    });

    document.getElementById('rptModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('rptModal')) {
        document.getElementById('rptModal').hidden = true;
      }
    });

    document.getElementById('rptSend').addEventListener('click', async () => {
      const name   = document.getElementById('rptName').value.trim();
      const reason = document.getElementById('rptReason').value.trim();
      const errEl  = document.getElementById('rptErr');

      if (!name || !reason) {
        errEl.textContent = 'Please fill in both fields.';
        errEl.style.display = 'block';
        return;
      }

      const btn = document.getElementById('rptSend');
      btn.disabled = true;
      btn.textContent = 'SENDING…';
      errEl.style.display = 'none';

      try {
        const res = await fetch('https://game-backend-wfmf.onrender.com/reports', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reportedName: name, reason })
        });
        if (!res.ok) {
          const d = await res.json().catch(() => ({}));
          throw new Error(d.message || `Server error ${res.status}`);
        }
        document.getElementById('rptModal').hidden = true;
        showProfToast('✓ Report submitted successfully', 'success');
      } catch (err) {
        errEl.textContent = err.message || 'Failed to submit report.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'SEND REPORT';
      }
    });

    /* ── Feedback Modal (Proposals / Problems) ─────────────── */
    let _fbkTab = 'proposal';

    function _fbkSwitchTab(tab) {
      _fbkTab = tab;
      document.getElementById('fbkFormProposal').hidden = tab !== 'proposal';
      document.getElementById('fbkFormProblem').hidden  = tab !== 'problem';
      document.getElementById('fbkTabProposal').classList.toggle('fbk-type-active', tab === 'proposal');
      document.getElementById('fbkTabProblem').classList.toggle('fbk-type-active',  tab === 'problem');
      document.getElementById('fbkSend').textContent = tab === 'proposal' ? 'SUBMIT PROPOSAL' : 'SUBMIT PROBLEM';
    }

    function _closeFbkModal() {
      document.getElementById('fbkModal').hidden = true;
    }

    document.getElementById('profileFeedbackBtn').addEventListener('click', () => {
      ['fbkPropTitle','fbkPropDesc','fbkProbTitle','fbkProbDesc'].forEach(id => { document.getElementById(id).value = ''; });
      document.getElementById('fbkErr').style.display = 'none';
      _fbkSwitchTab('proposal');
      document.getElementById('fbkModal').hidden = false;
      setTimeout(() => document.getElementById('fbkPropTitle').focus(), 60);
    });

    document.getElementById('fbkTabProposal').addEventListener('click', () => _fbkSwitchTab('proposal'));
    document.getElementById('fbkTabProblem').addEventListener('click',  () => _fbkSwitchTab('problem'));

    document.getElementById('fbkCancel').addEventListener('click', _closeFbkModal);
    document.getElementById('fbkModal').addEventListener('click', e => {
      if (e.target === document.getElementById('fbkModal')) _closeFbkModal();
    });

    document.getElementById('fbkSend').addEventListener('click', async () => {
      const isProposal = _fbkTab === 'proposal';
      const title = document.getElementById(isProposal ? 'fbkPropTitle' : 'fbkProbTitle').value.trim();
      const desc  = document.getElementById(isProposal ? 'fbkPropDesc'  : 'fbkProbDesc').value.trim();
      const errEl = document.getElementById('fbkErr');

      if (!title || !desc) {
        errEl.textContent = 'Please fill in both fields.';
        errEl.style.display = 'block';
        return;
      }

      const btn = document.getElementById('fbkSend');
      btn.disabled = true;
      btn.textContent = 'SUBMITTING…';
      errEl.style.display = 'none';

      try {
        if (isProposal) {
          await API.submitProposal(title, desc);
          showProfToast('✓ Proposal submitted! Thank you.', 'success');
        } else {
          await API.submitProblem(title, desc);
          showProfToast('✓ Problem report submitted! Thank you.', 'success');
        }
        document.getElementById('fbkModal').hidden = true;
      } catch (err) {
        errEl.textContent = err.message || 'Failed to submit. Try again.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        _fbkSwitchTab(_fbkTab);
      }
    });
  </script>
</body>
</html>
