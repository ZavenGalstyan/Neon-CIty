          <div class="chat">
            <div class="chat__header">
              <div class="chat__header-icon">💬</div>
              <div class="chat__header-info">
                <div class="chat__header-title">CLAN CHAT</div>
                <div class="chat__header-sub">Communicate with your clan</div>
              </div>
              <div class="chat__online">
                <span class="chat__online-dot"></span>
                <span id="onlineCount">0 Online</span>
              </div>
            </div>
            <div class="chat__messages" id="chatMessages">
              <div class="chat__empty">
                <span class="chat__empty-icon">💬</span>
                <span class="chat__empty-text">Chat with your clan!</span>
              </div>
            </div>
            <div class="chat__input-area">
              <input class="chat__input" id="chatInput" type="text" placeholder="Message your clan..." maxlength="500">
              <button class="chat__send-btn" id="chatSendBtn" title="Send message">➤</button>
            </div>
          </div>
        </section>

        <!-- ══ BROWSE CLANS VIEW ══════════════════════════════════ -->
        <section class="clan-view" id="view-browse">
          <div class="browse">
            <div class="browse__search">
              <div class="browse__search-wrap">
                <svg class="browse__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input class="browse__search-input" id="clanSearch" type="text" placeholder="Search clans by name or tag...">
              </div>
              <button class="browse__filter-btn">
                <span>⚙</span> FILTERS
              </button>
            </div>
            <div class="browse__grid" id="clansGrid">
              <!-- Clan cards populated by JS -->
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
  'use strict';

  /* ══════════════════════════════════════════════════════════════════
     STATE
  ══════════════════════════════════════════════════════════════════ */

  const state = {
    hasClan: false,
    clan: null,
    members: [],
    messages: [],
    allClans: [],
  };

  /* ══════════════════════════════════════════════════════════════════
     DOM REFERENCES
  ══════════════════════════════════════════════════════════════════ */

  const closeBtn = document.getElementById('closeBtn');
  const clanEmblem = document.getElementById('clanEmblem');
  const clanTagBadge = document.getElementById('clanTagBadge');
  const clanNameHeader = document.getElementById('clanNameHeader');
  const chatMessages = document.getElementById('chatMessages');
  const chatInput = document.getElementById('chatInput');
  const chatSendBtn = document.getElementById('chatSendBtn');
  const clansGrid = document.getElementById('clansGrid');
  const clanSearch = document.getElementById('clanSearch');

  /* ══════════════════════════════════════════════════════════════════
     CLOSE BUTTON
  ══════════════════════════════════════════════════════════════════ */

  closeBtn.addEventListener('click', () => {
    window.location.href = 'index.html';
  });

  /* ══════════════════════════════════════════════════════════════════
     VIEW NAVIGATION
  ══════════════════════════════════════════════════════════════════ */

  document.querySelectorAll('.clan-nav__item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.clan-nav__item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');

      const viewId = `view-${item.dataset.view}`;
      document.querySelectorAll('.clan-view').forEach(v => v.classList.remove('active'));
      document.getElementById(viewId)?.classList.add('active');
    });
  });

  /* ══════════════════════════════════════════════════════════════════
     MOCK DATA
  ══════════════════════════════════════════════════════════════════ */

  // Check if user has clan from localStorage or API
  const session = Auth.getSession();

  // Mock clan data for demonstration
  state.hasClan = true;
  state.clan = {
    name: 'AdminsClan',
    tag: 'ADNIM',
    emblem: '★',
    description: 'Elite players dominating the neon streets. Join us and become a legend.',
    members: 24,
    kills: 158420,
    rank: 3,
    leader: 'NeonMaster',
  };
  state.members = [
    { name: 'NeonMaster', role: 'leader', kills: 45230, online: true },
    { name: 'CyberHawk', role: 'officer', kills: 32100, online: true },
    { name: 'ShadowByte', role: 'officer', kills: 28450, online: false },
    { name: 'QuantumRush', role: 'member', kills: 21300, online: true },
    { name: 'VoltRunner', role: 'member', kills: 18920, online: false },
    { name: 'NightPulse', role: 'member', kills: 12420, online: true },
  ];

  state.allClans = [
    { name: 'Neon Warriors', tag: 'NEON', emblem: '⚔', members: 48, kills: 524000, rank: 1, activity: 'active', color: '#FF4466' },
    { name: 'Cyber Legion', tag: 'CLEG', emblem: '◆', members: 35, kills: 412000, rank: 2, activity: 'active', color: '#00F0FF' },
    { name: 'AdminsClan', tag: 'ADNIM', emblem: '★', members: 24, kills: 158420, rank: 3, activity: 'active', color: '#FFD700' },
    { name: 'Shadow Network', tag: 'SHAD', emblem: '◎', members: 31, kills: 298000, rank: 4, activity: 'active', color: '#AA66FF' },
    { name: 'Quantum Flux', tag: 'FLUX', emblem: '⬡', members: 18, kills: 145000, rank: 8, activity: 'moderate', color: '#44FF88' },
    { name: 'Ghost Protocol', tag: 'GHST', emblem: '◈', members: 12, kills: 89000, rank: 15, activity: 'inactive', color: '#8899AA' },
  ];

  /* ══════════════════════════════════════════════════════════════════
     RENDER MY CLAN VIEW
  ══════════════════════════════════════════════════════════════════ */

  function renderMyClan() {
    const container = document.getElementById('view-myclan');

    if (!state.hasClan) {
      container.innerHTML = `
        <div class="no-clan">
          <span class="no-clan__icon">◈</span>
          <h2 class="no-clan__title">NO CLAN YET</h2>
          <p class="no-clan__sub">Join an existing clan or create your own to team up with other players and dominate the leaderboards.</p>
          <div class="no-clan__actions">
            <button class="no-clan__btn no-clan__btn--primary" onclick="switchToView('browse')">BROWSE CLANS</button>
            <button class="no-clan__btn no-clan__btn--secondary">CREATE CLAN</button>
          </div>
        </div>
      `;
      return;
    }

    // Update header
    clanEmblem.textContent = state.clan.emblem;
    clanTagBadge.textContent = `[${state.clan.tag}]`;
    clanNameHeader.textContent = state.clan.name;

    const onlineCount = state.members.filter(m => m.online).length;

    container.innerHTML = `
      <div class="myclan">
        <div class="myclan__profile">
          <div class="myclan__banner">
            <div class="myclan__banner-scan"></div>
          </div>
          <div class="myclan__emblem-container">
            <div class="myclan__emblem-hex"></div>
            <div class="myclan__emblem-ring"></div>
            <div class="myclan__emblem">${state.clan.emblem}</div>
          </div>
          <div class="myclan__profile-body">
            <h2 class="myclan__name">${state.clan.name}</h2>
            <span class="myclan__tag-display">[${state.clan.tag}]</span>
            <p class="myclan__desc">${state.clan.description}</p>

            <div class="myclan__stats">
              <div class="myclan__stat">
                <span class="myclan__stat-value">${state.clan.members}</span>
                <span class="myclan__stat-label">Members</span>
              </div>
              <div class="myclan__stat">
                <span class="myclan__stat-value">${(state.clan.kills / 1000).toFixed(1)}K</span>
                <span class="myclan__stat-label">Total Kills</span>
              </div>
              <div class="myclan__stat">
                <span class="myclan__stat-value">#${state.clan.rank}</span>
                <span class="myclan__stat-label">Clan Rank</span>
              </div>
              <div class="myclan__stat">
                <span class="myclan__stat-value">${onlineCount}</span>
                <span class="myclan__stat-label">Online Now</span>
              </div>
            </div>

            <div class="myclan__leader">
              <div class="myclan__leader-avatar">${state.clan.leader[0]}</div>
              <div class="myclan__leader-info">
                <span class="myclan__leader-role">CLAN LEADER</span>
                <span class="myclan__leader-name">${state.clan.leader}</span>
              </div>
            </div>
          </div>
        </div>

        <div class="myclan__members">
          <div class="myclan__members-header">
            <h3 class="myclan__members-title">CLAN ROSTER</h3>
            <span class="myclan__members-count">${state.members.length} / 50</span>
          </div>

          <div class="myclan__invite">
            <input class="myclan__invite-input" type="text" placeholder="Enter player name to invite...">
            <button class="myclan__invite-btn">SEND INVITE</button>
          </div>

          <div class="myclan__members-list">
            ${state.members.map(m => `
              <div class="myclan__member">
                <div class="myclan__member-avatar">
                  ${m.name[0]}
                  <span class="myclan__member-status myclan__member-status--${m.online ? 'online' : 'offline'}"></span>
                </div>
                <div class="myclan__member-info">
                  <span class="myclan__member-name">${m.name}</span>
                  <span class="myclan__member-role myclan__member-role--${m.role}">${m.role.toUpperCase()}</span>
                </div>
                <span class="myclan__member-kills">${m.kills.toLocaleString()}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  }

  /* ══════════════════════════════════════════════════════════════════
     RENDER BROWSE VIEW
  ══════════════════════════════════════════════════════════════════ */

  function renderBrowse(filter = '') {
    const filtered = state.allClans.filter(c =>
      c.name.toLowerCase().includes(filter.toLowerCase()) ||
      c.tag.toLowerCase().includes(filter.toLowerCase())
    );

    if (filtered.length === 0) {
      clansGrid.innerHTML = `
        <div class="browse__empty">
          <span class="browse__empty-icon">◎</span>
          <span class="browse__empty-text">No clans found matching "${filter}"</span>
        </div>
      `;
      return;
    }

    clansGrid.innerHTML = filtered.map(clan => `
      <div class="clan-card" style="--card-color: ${clan.color}50; --card-glow: ${clan.color}25; --card-text: ${clan.color}; --card-color-dim: ${clan.color}18;">
        <div class="clan-card__header">
          <div class="clan-card__emblem" style="border-color: ${clan.color}70; box-shadow: 0 0 25px ${clan.color}20, inset 0 0 15px rgba(0,0,0,0.4);">
            ${clan.emblem}
          </div>
          <div class="clan-card__info">
            <h3 class="clan-card__name">${clan.name}</h3>
            <span class="clan-card__tag" style="background: ${clan.color}12; border-color: ${clan.color}35; color: ${clan.color};">[${clan.tag}]</span>
            ${clan.desc ? `<p class="clan-card__desc">${clan.desc}</p>` : ''}
          </div>
          <span class="clan-card__activity ${clan.activity === 'inactive' ? 'clan-card__activity--inactive' : ''}">${clan.activity.toUpperCase()}</span>
        </div>
        <div class="clan-card__stats">
          <div class="clan-card__stat">
            <span class="clan-card__stat-value">${clan.members}</span>
            <span class="clan-card__stat-label">Members</span>
          </div>
          <div class="clan-card__stat">
            <span class="clan-card__stat-value">${(clan.kills / 1000).toFixed(0)}K</span>
            <span class="clan-card__stat-label">Kills</span>
          </div>
          <div class="clan-card__stat">
            <span class="clan-card__stat-value">#${clan.rank}</span>
            <span class="clan-card__stat-label">Rank</span>
          </div>
        </div>
        <div class="clan-card__footer">
          <button class="clan-card__join-btn" style="background: linear-gradient(135deg, ${clan.color}18, ${clan.color}08); border-color: ${clan.color}40; color: ${clan.color};">
            ${state.clan?.tag === clan.tag ? 'YOUR CLAN' : 'OPEN'}
          </button>
        </div>
      </div>
    `).join('');
  }

  /* ══════════════════════════════════════════════════════════════════
     CHAT FUNCTIONALITY
  ══════════════════════════════════════════════════════════════════ */

  function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;

    const msg = {
      id: Date.now(),
      sender: session?.name || 'You',
      text,
      time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
    };

    state.messages.push(msg);
    renderMessages();
    chatInput.value = '';
  }

  function renderMessages() {
    if (state.messages.length === 0) {
      chatMessages.innerHTML = `
        <div class="chat__empty">
          <span class="chat__empty-icon">💬</span>
          <span class="chat__empty-text">Chat with your clan!</span>
        </div>
      `;
      return;
    }

    chatMessages.innerHTML = state.messages.map(msg => `
      <div class="chat__message">
        <div class="chat__message-avatar">${msg.sender[0]}</div>
        <div class="chat__message-content">
          <div class="chat__message-header">
            <span class="chat__message-name">${msg.sender}</span>
            <span class="chat__message-time">${msg.time}</span>
          </div>
          <div class="chat__message-text">${escapeHtml(msg.text)}</div>
        </div>
      </div>
    `).join('');

    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  chatSendBtn.addEventListener('click', sendMessage);
  chatInput.addEventListener('keypress', e => {
    if (e.key === 'Enter') sendMessage();
  });

  /* ══════════════════════════════════════════════════════════════════
     SEARCH FUNCTIONALITY
  ══════════════════════════════════════════════════════════════════ */

  clanSearch.addEventListener('input', e => {
    renderBrowse(e.target.value);
  });

  /* ══════════════════════════════════════════════════════════════════
     HELPER - Switch view programmatically
  ══════════════════════════════════════════════════════════════════ */

  window.switchToView = function(viewName) {
    document.querySelectorAll('.clan-nav__item').forEach(item => {
      item.classList.toggle('active', item.dataset.view === viewName);
    });
    document.querySelectorAll('.clan-view').forEach(v => {
      v.classList.toggle('active', v.id === `view-${viewName}`);
    });
  };

  /* ══════════════════════════════════════════════════════════════════
     UPDATE ONLINE COUNT
  ══════════════════════════════════════════════════════════════════ */

  function updateOnlineCount() {
    const count = state.members.filter(m => m.online).length;
    document.getElementById('onlineCount').textContent = `${count} Online`;
  }

  /* ══════════════════════════════════════════════════════════════════
     INITIALIZE
  ══════════════════════════════════════════════════════════════════ */

  renderMyClan();
  renderBrowse();
  updateOnlineCount();
  </script>
</body>
</html>
