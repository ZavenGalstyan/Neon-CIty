<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DASH DREAD — Leaderboards</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
  /* ═══════════════════════════════════════════════════════════════════
     LEADERBOARDS — ULTRA-PREMIUM AAA CYBERPUNK ESPORTS UI
     Next-Gen Competitive Gaming Interface
     Inspired by: Valorant, Destiny 2, Cyberpunk 2077, Tron Legacy
  ═══════════════════════════════════════════════════════════════════ */

  :root {
    /* Core colors */
    --lb-gold: #FFD700;
    --lb-gold-bright: #FFEA00;
    --lb-gold-dim: rgba(255,215,0,0.12);
    --lb-silver: #E8E8F0;
    --lb-silver-dim: rgba(232,232,240,0.1);
    --lb-bronze: #FF8844;
    --lb-bronze-dim: rgba(255,136,68,0.1);

    /* Neon accents */
    --lb-cyan: #00F0FF;
    --lb-magenta: #FF00AA;
    --lb-purple: #AA66FF;
    --lb-orange: #FF6600;
    --lb-electric: #44EEFF;

    /* Surfaces */
    --lb-surface: rgba(8,6,18,0.92);
    --lb-glass: rgba(15,12,30,0.8);
    --lb-glass-hover: rgba(25,20,45,0.85);
    --lb-border: rgba(255,255,255,0.06);
    --lb-border-glow: rgba(255,68,102,0.4);
  }

  /* ═══════════════════════════════════════════════════════════════════
     ANIMATED BACKGROUND SYSTEM
  ═══════════════════════════════════════════════════════════════════ */

  .lb-page {
    position: relative;
    min-height: 100vh;
    padding: 0 0 120px;
    overflow: hidden;
    background: linear-gradient(180deg, #030308 0%, #0a0815 40%, #0d0a1a 100%);
  }

  /* Holographic animated grid */
  .lb-page::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,68,102,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,68,102,0.025) 1px, transparent 1px),
      linear-gradient(rgba(0,240,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.015) 1px, transparent 1px);
    background-size: 80px 80px, 80px 80px, 40px 40px, 40px 40px;
    animation: grid-drift 60s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes grid-drift {
    0% { transform: translate(0, 0) perspective(500px) rotateX(2deg); }
    100% { transform: translate(80px, 80px) perspective(500px) rotateX(2deg); }
  }

  /* Premium ambient orbs */
  .lb-orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(120px);
    will-change: transform;
    z-index: 0;
  }
  .lb-orb--1 {
    width: 900px; height: 900px;
    top: -400px; left: -200px;
    background: radial-gradient(circle, rgba(255,68,102,0.15) 0%, rgba(255,0,170,0.05) 40%, transparent 70%);
    animation: orb-float-1 30s ease-in-out infinite alternate;
  }
  .lb-orb--2 {
    width: 700px; height: 700px;
    bottom: -300px; right: -150px;
    background: radial-gradient(circle, rgba(255,215,0,0.12) 0%, rgba(255,150,0,0.04) 50%, transparent 70%);
    animation: orb-float-2 35s ease-in-out infinite alternate;
  }
  .lb-orb--3 {
    width: 500px; height: 500px;
    top: 40%; left: 50%;
    background: radial-gradient(circle, rgba(0,240,255,0.08) 0%, rgba(170,100,255,0.03) 50%, transparent 70%);
    animation: orb-float-3 25s ease-in-out infinite alternate;
  }
  @keyframes orb-float-1 {
    0% { transform: translate(0, 0) scale(1); opacity: 0.8; }
    50% { transform: translate(80px, 60px) scale(1.2); opacity: 1; }
    100% { transform: translate(40px, 100px) scale(1.1); opacity: 0.9; }
  }
  @keyframes orb-float-2 {
    0% { transform: translate(0, 0) scale(1); opacity: 0.7; }
    50% { transform: translate(-100px, -80px) scale(1.15); opacity: 1; }
    100% { transform: translate(-60px, -40px) scale(1.05); opacity: 0.85; }
  }
  @keyframes orb-float-3 {
    0% { transform: translate(-50%, 0) scale(1); opacity: 0.5; }
    50% { transform: translate(-50%, 100px) scale(1.3); opacity: 0.8; }
    100% { transform: translate(-50%, 50px) scale(1.1); opacity: 0.6; }
  }

  /* Floating particles */
  .lb-particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .lb-particle {
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    opacity: 0;
    animation: particle-rise 20s linear infinite;
  }
  .lb-particle:nth-child(1) { left: 8%; background: var(--lb-cyan); box-shadow: 0 0 8px var(--lb-cyan); animation-delay: 0s; animation-duration: 18s; }
  .lb-particle:nth-child(2) { left: 18%; background: var(--lb-magenta); box-shadow: 0 0 8px var(--lb-magenta); animation-delay: 2s; animation-duration: 22s; }
  .lb-particle:nth-child(3) { left: 32%; background: var(--lb-gold); box-shadow: 0 0 8px var(--lb-gold); animation-delay: 5s; animation-duration: 16s; }
  .lb-particle:nth-child(4) { left: 45%; background: var(--lb-electric); box-shadow: 0 0 8px var(--lb-electric); animation-delay: 8s; animation-duration: 24s; }
  .lb-particle:nth-child(5) { left: 58%; background: var(--lb-purple); box-shadow: 0 0 8px var(--lb-purple); animation-delay: 3s; animation-duration: 19s; }
  .lb-particle:nth-child(6) { left: 72%; background: var(--lb-cyan); box-shadow: 0 0 8px var(--lb-cyan); animation-delay: 7s; animation-duration: 21s; }
  .lb-particle:nth-child(7) { left: 85%; background: var(--lb-gold); box-shadow: 0 0 8px var(--lb-gold); animation-delay: 11s; animation-duration: 17s; }
  .lb-particle:nth-child(8) { left: 92%; background: var(--lb-magenta); box-shadow: 0 0 8px var(--lb-magenta); animation-delay: 4s; animation-duration: 23s; }

  @keyframes particle-rise {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.9; transform: translateY(85vh) scale(1); }
    85% { opacity: 0.5; }
    100% { transform: translateY(-5vh) scale(0.4); opacity: 0; }
  }

  /* Energy streaks */
  .lb-energy-streak {
    position: fixed;
    height: 1px;
    pointer-events: none;
    z-index: 1;
    opacity: 0.4;
    animation: streak-pulse 5s ease-in-out infinite;
  }
  .lb-energy-streak--1 {
    top: 12%; left: 0; right: 45%;
    background: linear-gradient(90deg, transparent, var(--lb-cyan), transparent);
    animation-delay: 0s;
  }
  .lb-energy-streak--2 {
    top: 38%; left: 35%; right: 0;
    background: linear-gradient(90deg, transparent, var(--lb-magenta), transparent);
    animation-delay: 2s;
  }
  .lb-energy-streak--3 {
    bottom: 22%; left: 0; right: 55%;
    background: linear-gradient(90deg, transparent, var(--lb-gold), transparent);
    animation-delay: 4s;
  }
  @keyframes streak-pulse {
    0%, 100% { opacity: 0.2; transform: scaleX(0.85); }
    50% { opacity: 0.5; transform: scaleX(1); }
  }

  /* HUD corner accents */
  .lb-hud-corner {
    position: fixed;
    width: 140px;
    height: 140px;
    pointer-events: none;
    z-index: 2;
    opacity: 0.5;
  }
  .lb-hud-corner--tl { top: 0; left: 0; }
  .lb-hud-corner--tr { top: 0; right: 0; transform: scaleX(-1); }
  .lb-hud-corner--bl { bottom: 0; left: 0; transform: scaleY(-1); }
  .lb-hud-corner--br { bottom: 0; right: 0; transform: scale(-1); }
  .lb-hud-corner svg { width: 100%; height: 100%; }

  /* ═══════════════════════════════════════════════════════════════════
     CINEMATIC HERO HEADER
  ═══════════════════════════════════════════════════════════════════ */

  .lb-hero {
    position: relative;
    text-align: center;
    padding: 80px 40px 60px;
    z-index: 10;
    overflow: hidden;
  }

  /* Radial glow behind title */
  .lb-hero::before {
    content: '';
    position: absolute;
    top: -100px; left: 50%;
    transform: translateX(-50%);
    width: 1200px; height: 600px;
    background: radial-gradient(ellipse 60% 50% at 50% 30%,
      rgba(255,68,102,0.12) 0%,
      rgba(255,215,0,0.05) 30%,
      transparent 70%);
    pointer-events: none;
    animation: hero-glow 8s ease-in-out infinite alternate;
  }
  @keyframes hero-glow {
    0% { opacity: 0.6; transform: translateX(-50%) scale(1); }
    100% { opacity: 1; transform: translateX(-50%) scale(1.1); }
  }

  /* Scanning line effect */
  .lb-hero::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 20%, var(--lb-cyan), transparent 80%);
    animation: scan-line 4s ease-in-out infinite;
    opacity: 0.6;
  }
  @keyframes scan-line {
    0%, 100% { top: 0; opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    50% { top: 100%; opacity: 0.3; }
  }

  /* Eyebrow label */
  .lb-hero__eyebrow {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5em;
    color: var(--lb-cyan);
    text-shadow: 0 0 30px var(--lb-cyan);
    text-transform: uppercase;
  }
  .lb-hero__eyebrow-icon {
    font-size: 14px;
    animation: icon-pulse 2s ease-in-out infinite;
  }
  @keyframes icon-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  /* Main title - Cinematic gradient */
  .lb-hero__title {
    position: relative;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(48px, 10vw, 100px);
    font-weight: 900;
    letter-spacing: 0.12em;
    line-height: 0.95;
    margin-bottom: 24px;
    background: linear-gradient(135deg,
      #ffffff 0%,
      #FF6688 15%,
      #FF4466 30%,
      #FFD700 50%,
      #FF8844 65%,
      #FF4466 80%,
      #CC88FF 100%);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 80px rgba(255,68,102,0.4));
    animation: title-shimmer 10s ease-in-out infinite;
  }
  @keyframes title-shimmer {
    0%, 100% { background-position: 0% 50%; filter: drop-shadow(0 0 60px rgba(255,68,102,0.3)); }
    50% { background-position: 100% 50%; filter: drop-shadow(0 0 100px rgba(255,68,102,0.5)); }
  }

  /* Subtitle */
  .lb-hero__sub {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.35em;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }
  .lb-hero__sub-dot {
    width: 4px; height: 4px;
    background: var(--lb-gold);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--lb-gold);
  }

  /* Player status badge */
  .lb-player-badge {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    margin-top: 32px;
    padding: 14px 32px;
    background: linear-gradient(135deg, rgba(0,240,255,0.08) 0%, rgba(0,240,255,0.02) 100%);
    border: 1px solid rgba(0,240,255,0.3);
    border-radius: 100px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow:
      0 0 40px rgba(0,240,255,0.1),
      0 8px 32px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.05);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .lb-player-badge:hover {
    border-color: rgba(0,240,255,0.5);
    box-shadow: 0 0 60px rgba(0,240,255,0.15), 0 12px 40px rgba(0,0,0,0.4);
    transform: translateY(-2px);
  }

  .lb-player-badge__status {
    position: relative;
    width: 10px; height: 10px;
    background: var(--lb-cyan);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--lb-cyan);
  }
  .lb-player-badge__status::after {
    content: '';
    position: absolute;
    inset: -4px;
    border: 2px solid var(--lb-cyan);
    border-radius: 50%;
    opacity: 0.4;
    animation: status-ping 2s ease-out infinite;
  }
  @keyframes status-ping {
    0% { transform: scale(1); opacity: 0.4; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  .lb-player-badge__name {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--lb-cyan);
    text-shadow: 0 0 20px rgba(0,240,255,0.5);
  }

  .lb-player-badge__label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.35);
    padding-left: 14px;
    border-left: 1px solid rgba(255,255,255,0.1);
  }

  /* ═══════════════════════════════════════════════════════════════════
     NOTIFICATION BANNER
  ═══════════════════════════════════════════════════════════════════ */

  .lb-notification {
    position: relative;
    display: flex;
    align-items: center;
    gap: 18px;
    max-width: 960px;
    margin: 0 auto 32px;
    padding: 20px 28px;
    background: linear-gradient(135deg, rgba(255,68,102,0.08) 0%, rgba(255,100,50,0.03) 100%);
    border: 1px solid rgba(255,68,102,0.3);
    border-radius: 16px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    overflow: hidden;
    animation: notification-appear 0.4s ease;
  }
  @keyframes notification-appear {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .lb-notification::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(90deg, var(--lb-magenta), var(--lb-orange), var(--lb-magenta));
    background-size: 200% 100%;
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    animation: border-flow 4s linear infinite;
    opacity: 0.5;
  }
  @keyframes border-flow {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  .lb-notification__icon {
    width: 44px; height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,68,102,0.12);
    border: 1px solid rgba(255,68,102,0.3);
    border-radius: 12px;
    font-size: 20px;
    flex-shrink: 0;
  }

  .lb-notification__msg {
    flex: 1;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: rgba(255,136,153,0.9);
    letter-spacing: 0.04em;
  }

  .lb-notification__btn {
    padding: 12px 28px;
    background: linear-gradient(135deg, rgba(255,68,102,0.15) 0%, rgba(255,68,102,0.06) 100%);
    border: 1px solid rgba(255,68,102,0.4);
    border-radius: 10px;
    color: var(--pink);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.25s ease;
    white-space: nowrap;
  }
  .lb-notification__btn:hover {
    background: linear-gradient(135deg, rgba(255,68,102,0.25) 0%, rgba(255,68,102,0.12) 100%);
    border-color: rgba(255,68,102,0.7);
    box-shadow: 0 0 30px rgba(255,68,102,0.2);
    transform: translateY(-1px);
  }

  /* ═══════════════════════════════════════════════════════════════════
     PREMIUM CATEGORY TABS
  ═══════════════════════════════════════════════════════════════════ */

  .lb-tabs-wrapper {
    position: relative;
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 28px 40px;
    z-index: 10;
  }

  .lb-tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .lb-tab {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    min-height: 52px;
    background: var(--lb-glass);
    border: 1px solid var(--lb-border);
    border-radius: 100px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    white-space: nowrap;
    overflow: hidden;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    text-transform: uppercase;
  }

  /* Gradient top shine */
  .lb-tab::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent);
    border-radius: 100px 100px 0 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }

  /* Bottom accent line */
  .lb-tab::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) scaleX(0);
    width: 50%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--pink), transparent);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .lb-tab__icon {
    font-size: 14px;
    opacity: 0.7;
    transition: all 0.3s ease;
    filter: drop-shadow(0 0 0 transparent);
  }

  .lb-tab:hover {
    color: rgba(255,255,255,0.9);
    border-color: rgba(255,255,255,0.15);
    background: var(--lb-glass-hover);
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .lb-tab:hover::before { opacity: 1; }
  .lb-tab:hover .lb-tab__icon {
    opacity: 1;
    transform: scale(1.1);
  }

  .lb-tab.active {
    background: linear-gradient(135deg, rgba(255,68,102,0.15) 0%, rgba(255,68,102,0.06) 100%);
    border-color: rgba(255,68,102,0.5);
    color: #fff;
    box-shadow:
      0 0 50px rgba(255,68,102,0.15),
      0 10px 40px rgba(0,0,0,0.4),
      inset 0 0 40px rgba(255,68,102,0.05);
    text-shadow: 0 0 20px rgba(255,68,102,0.6);
    animation: tab-active-pulse 3s ease-in-out infinite;
  }
  @keyframes tab-active-pulse {
    0%, 100% { box-shadow: 0 0 40px rgba(255,68,102,0.12), 0 10px 40px rgba(0,0,0,0.4); }
    50% { box-shadow: 0 0 60px rgba(255,68,102,0.2), 0 10px 40px rgba(0,0,0,0.4); }
  }

  .lb-tab.active::before { opacity: 1; }
  .lb-tab.active::after { transform: translateX(-50%) scaleX(1); }
  .lb-tab.active .lb-tab__icon {
    opacity: 1;
    filter: drop-shadow(0 0 10px var(--pink));
    animation: icon-glow 2s ease-in-out infinite alternate;
  }
  @keyframes icon-glow {
    0% { filter: drop-shadow(0 0 6px var(--pink)); }
    100% { filter: drop-shadow(0 0 14px var(--pink)); }
  }

  .lb-tab[disabled] {
    opacity: 0.3;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* ═══════════════════════════════════════════════════════════════════
     MAP SELECTOR ROW
  ═══════════════════════════════════════════════════════════════════ */

  .lb-map-row {
    display: flex;
    justify-content: center;
    padding: 0 28px 40px;
    z-index: 100;
  }

  .map-dropdown {
    position: relative;
    width: 100%;
    max-width: 360px;
    z-index: 100;
  }

  .map-dropdown__trigger {
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 24px;
    min-height: 56px;
    background: linear-gradient(135deg, rgba(15,12,30,0.95) 0%, rgba(25,20,45,0.95) 100%);
    border: 1px solid rgba(255,68,102,0.3);
    border-radius: 16px;
    cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #fff;
    overflow: hidden;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow:
      0 0 40px rgba(255,68,102,0.08),
      0 8px 32px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .map-dropdown__trigger::before {
    content: '';
    position: absolute;
    top: -50%; left: -100%;
    width: 50%; height: 200%;
    background: linear-gradient(105deg, transparent, rgba(255,255,255,0.06), transparent);
    transform: skewX(-15deg);
    pointer-events: none;
  }

  .map-dropdown__trigger:hover {
    border-color: rgba(255,68,102,0.5);
    box-shadow: 0 0 60px rgba(255,68,102,0.12), 0 12px 40px rgba(0,0,0,0.5);
    transform: translateY(-2px);
  }
  .map-dropdown__trigger:hover::before {
    animation: trigger-shine 0.6s ease forwards;
  }
  @keyframes trigger-shine {
    from { left: -100%; }
    to { left: 200%; }
  }

  .map-dropdown.open .map-dropdown__trigger {
    border-color: rgba(255,68,102,0.6);
    border-radius: 16px 16px 0 0;
  }

  .map-dropdown__icon {
    font-size: 18px;
    color: var(--pink);
    filter: drop-shadow(0 0 8px var(--pink));
  }

  .map-dropdown__selected {
    flex: 1;
    text-align: left;
  }

  .map-dropdown__arrow {
    width: 20px; height: 20px;
    color: rgba(255,255,255,0.5);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .map-dropdown.open .map-dropdown__arrow {
    transform: rotate(180deg);
    color: var(--pink);
  }

  /* Dropdown panel */
  .map-dropdown__panel {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    margin-top: -1px;
    background: linear-gradient(180deg, rgba(20,15,35,0.98) 0%, rgba(12,10,25,0.98) 100%);
    border: 1px solid rgba(255,68,102,0.3);
    border-top: none;
    border-radius: 0 0 16px 16px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 1000;
    overflow: hidden;
  }

  .map-dropdown.open .map-dropdown__panel {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }

  .map-dropdown__search {
    padding: 16px 18px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .map-dropdown__search-wrap {
    position: relative;
  }

  .map-dropdown__search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: rgba(255,255,255,0.3);
    pointer-events: none;
  }

  .map-dropdown__search-input {
    width: 100%;
    padding: 12px 14px 12px 44px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    outline: none;
    transition: all 0.25s ease;
  }

  .map-dropdown__search-input::placeholder {
    color: rgba(255,255,255,0.3);
  }

  .map-dropdown__search-input:focus {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,68,102,0.4);
    box-shadow: 0 0 20px rgba(255,68,102,0.1);
  }

  .map-dropdown__list {
    max-height: 320px;
    overflow-y: auto;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,68,102,0.3) transparent;
  }

  .map-dropdown__list::-webkit-scrollbar {
    width: 6px;
  }
  .map-dropdown__list::-webkit-scrollbar-track {
    background: transparent;
  }
  .map-dropdown__list::-webkit-scrollbar-thumb {
    background: rgba(255,68,102,0.3);
    border-radius: 3px;
  }

  .map-dropdown__group {
    margin-bottom: 4px;
  }

  .map-dropdown__group-label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px 6px;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }

  .map-dropdown__item {
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 14px 20px;
    min-height: 52px;
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    text-align: left;
    transition: all 0.2s ease;
    overflow: hidden;
  }

  .map-dropdown__item-glow {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, var(--item-color, rgba(255,68,102,0.1)), transparent);
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
  }

  .map-dropdown__item:hover {
    background: rgba(255,255,255,0.04);
    color: #fff;
  }
  .map-dropdown__item:hover .map-dropdown__item-glow {
    opacity: 0.1;
  }

  .map-dropdown__item.selected {
    background: rgba(255,68,102,0.1);
    color: #fff;
  }
  .map-dropdown__item.selected .map-dropdown__item-glow {
    opacity: 0.15;
  }

  .map-dropdown__item-icon {
    font-size: 18px;
    flex-shrink: 0;
    filter: drop-shadow(0 0 6px currentColor);
    transition: all 0.2s ease;
  }

  .map-dropdown__item:hover .map-dropdown__item-icon {
    transform: scale(1.15);
    filter: drop-shadow(0 0 12px currentColor);
  }

  .map-dropdown__item-name {
    flex: 1;
  }

  .map-dropdown__item-check {
    width: 18px; height: 18px;
    flex-shrink: 0;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .map-dropdown__item-check svg {
    width: 100%; height: 100%;
    stroke: var(--pink);
    filter: drop-shadow(0 0 6px var(--pink));
  }

  .map-dropdown__item.selected .map-dropdown__item-check {
    opacity: 1;
    transform: scale(1);
  }

  .map-dropdown__empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 40px 20px;
    color: rgba(255,255,255,0.4);
    font-family: 'Rajdhani', sans-serif;
  }

  .map-dropdown__backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 99;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
  }

  /* ═══════════════════════════════════════════════════════════════════
     CONTENT AREA
  ═══════════════════════════════════════════════════════════════════ */

  .lb-content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 28px;
    position: relative;
    z-index: 10;
  }

  /* Loading state */
  .lb-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 120px 28px;
  }

  .lb-spinner {
    position: relative;
    width: 60px; height: 60px;
  }

  .lb-spinner::before,
  .lb-spinner::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
  }
  .lb-spinner::before {
    border: 3px solid rgba(255,68,102,0.1);
  }
  .lb-spinner::after {
    border: 3px solid transparent;
    border-top-color: var(--pink);
    border-right-color: var(--lb-gold);
    animation: spinner-rotate 0.8s linear infinite;
  }
  @keyframes spinner-rotate { to { transform: rotate(360deg); } }

  .lb-loading-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.4);
    animation: loading-pulse 1.5s ease-in-out infinite;
  }
  @keyframes loading-pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }

  /* ═══════════════════════════════════════════════════════════════════
     LEGENDARY PODIUM CARDS — Top 3 Players
  ═══════════════════════════════════════════════════════════════════ */

  .lb-podium {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 20px;
    margin-bottom: 60px;
    padding: 0 16px;
    animation: podium-appear 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes podium-appear {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Cinematic glow underneath podium */
  .lb-podium::before {
    content: '';
    position: absolute;
    bottom: -40px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    height: 120px;
    background: radial-gradient(ellipse 50% 50% at 50% 100%, rgba(255,215,0,0.08) 0%, transparent 70%);
    pointer-events: none;
    filter: blur(20px);
  }

  .lb-podium-card {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    max-width: 300px;
    min-width: 200px;
    padding: 32px 24px 28px;
    border-radius: 24px;
    border: 1px solid;
    overflow: hidden;
    cursor: default;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Holographic shimmer overlay */
  .lb-podium-card::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(105deg, transparent, rgba(255,255,255,0.06), rgba(255,255,255,0.1), transparent);
    transform: skewX(-15deg);
    pointer-events: none;
    z-index: 2;
  }

  /* Inner radial glow */
  .lb-podium-card::after {
    content: '';
    position: absolute;
    top: -60%; left: -30%;
    width: 160%; height: 120%;
    border-radius: 50%;
    opacity: 0.1;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .lb-podium-card:hover::before {
    animation: card-shimmer 0.7s ease forwards;
  }
  @keyframes card-shimmer {
    from { left: -100%; }
    to { left: 200%; }
  }

  /* ── GOLD — 1st Place ────────────────────────────────────────────── */
  .lb-podium-card--gold {
    background: linear-gradient(170deg, rgba(255,215,0,0.15) 0%, rgba(255,180,50,0.05) 50%, rgba(255,215,0,0.02) 100%);
    border-color: rgba(255,215,0,0.5);
    order: 2;
    transform: translateY(-32px);
    padding-top: 40px;
    box-shadow:
      0 0 100px rgba(255,215,0,0.2),
      0 25px 60px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.15),
      inset 0 -1px 0 rgba(0,0,0,0.2);
    animation: gold-pulse 4s ease-in-out infinite alternate;
  }
  .lb-podium-card--gold::after { background: radial-gradient(circle, #FFD700 0%, transparent 70%); }

  @keyframes gold-pulse {
    0% { box-shadow: 0 0 80px rgba(255,215,0,0.15), 0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15); }
    100% { box-shadow: 0 0 120px rgba(255,215,0,0.3), 0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2); }
  }

  .lb-podium-card--gold:hover {
    transform: translateY(-40px) scale(1.02);
    border-color: rgba(255,215,0,0.7);
  }

  /* ── SILVER — 2nd Place ──────────────────────────────────────────── */
  .lb-podium-card--silver {
    background: linear-gradient(170deg, rgba(200,220,240,0.12) 0%, rgba(150,180,210,0.04) 50%, rgba(200,220,240,0.02) 100%);
    border-color: rgba(200,220,240,0.4);
    order: 1;
    box-shadow:
      0 0 60px rgba(150,200,255,0.1),
      0 20px 50px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .lb-podium-card--silver::after { background: radial-gradient(circle, #B0C4DE 0%, transparent 70%); }

  .lb-podium-card--silver:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: rgba(200,220,240,0.6);
    box-shadow: 0 0 80px rgba(150,200,255,0.15), 0 25px 55px rgba(0,0,0,0.5);
  }

  /* ── BRONZE — 3rd Place ──────────────────────────────────────────── */
  .lb-podium-card--bronze {
    background: linear-gradient(170deg, rgba(255,136,68,0.12) 0%, rgba(205,127,50,0.04) 50%, rgba(255,136,68,0.02) 100%);
    border-color: rgba(255,136,68,0.4);
    order: 3;
    box-shadow:
      0 0 60px rgba(255,136,68,0.1),
      0 20px 50px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .lb-podium-card--bronze::after { background: radial-gradient(circle, #FF8844 0%, transparent 70%); }

  .lb-podium-card--bronze:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: rgba(255,136,68,0.6);
    box-shadow: 0 0 80px rgba(255,136,68,0.15), 0 25px 55px rgba(0,0,0,0.5);
  }

  /* Medal / Crown */
  .lb-podium-medal {
    font-size: 44px;
    margin-bottom: 18px;
    filter: drop-shadow(0 0 20px currentColor);
    transition: all 0.3s ease;
    z-index: 3;
  }
  .lb-podium-card--gold .lb-podium-medal {
    animation: crown-float 3s ease-in-out infinite;
  }
  @keyframes crown-float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-6px) rotate(2deg); }
    75% { transform: translateY(-4px) rotate(-2deg); }
  }
  .lb-podium-card:hover .lb-podium-medal {
    transform: scale(1.15);
  }

  /* Glowing avatar frame */
  .lb-podium-avatar {
    position: relative;
    width: 72px; height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 24px;
    font-weight: 900;
    margin-bottom: 18px;
    flex-shrink: 0;
    z-index: 3;
    transition: all 0.3s ease;
  }

  /* Rotating ring around avatar */
  .lb-podium-avatar::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid transparent;
    animation: avatar-ring-rotate 4s linear infinite;
  }
  @keyframes avatar-ring-rotate { to { transform: rotate(360deg); } }

  /* Inner glow */
  .lb-podium-avatar::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.2), transparent 60%);
    pointer-events: none;
  }

  .lb-podium-card:hover .lb-podium-avatar {
    transform: scale(1.08);
  }

  .lb-podium-avatar--gold {
    border: 3px solid rgba(255,215,0,0.7);
    background: linear-gradient(145deg, rgba(255,215,0,0.2) 0%, rgba(255,180,50,0.1) 100%);
    color: var(--lb-gold);
    box-shadow: 0 0 30px rgba(255,215,0,0.3);
  }
  .lb-podium-avatar--gold::before { border-top-color: rgba(255,215,0,0.8); }

  .lb-podium-avatar--silver {
    border: 3px solid rgba(200,220,240,0.6);
    background: linear-gradient(145deg, rgba(200,220,240,0.15) 0%, rgba(150,180,210,0.08) 100%);
    color: var(--lb-silver);
    box-shadow: 0 0 25px rgba(200,220,240,0.25);
  }
  .lb-podium-avatar--silver::before { border-top-color: rgba(200,220,240,0.7); }

  .lb-podium-avatar--bronze {
    border: 3px solid rgba(255,136,68,0.6);
    background: linear-gradient(145deg, rgba(255,136,68,0.15) 0%, rgba(205,127,50,0.08) 100%);
    color: var(--lb-bronze);
    box-shadow: 0 0 25px rgba(255,136,68,0.25);
  }
  .lb-podium-avatar--bronze::before { border-top-color: rgba(255,136,68,0.7); }

  /* Info wrapper */
  .lb-podium-info {
    display: contents;
  }

  /* Player name */
  .lb-podium-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-align: center;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 8px;
    z-index: 3;
  }
  .lb-podium-name--gold { color: var(--lb-gold); text-shadow: 0 0 25px rgba(255,215,0,0.6); }
  .lb-podium-name--silver { color: var(--lb-silver); text-shadow: 0 0 20px rgba(200,220,240,0.5); }
  .lb-podium-name--bronze { color: var(--lb-bronze); text-shadow: 0 0 20px rgba(255,136,68,0.5); }

  /* Character */
  .lb-podium-char {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    margin-bottom: 18px;
    z-index: 3;
  }

  .lb-podium-char-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 8px currentColor;
  }

  /* Score value */
  .lb-podium-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 0.06em;
    text-align: center;
    z-index: 3;
  }
  .lb-podium-value--gold { color: var(--lb-gold); text-shadow: 0 0 24px rgba(255,215,0,0.5); }
  .lb-podium-value--silver { color: var(--lb-silver); text-shadow: 0 0 18px rgba(200,220,240,0.4); }
  .lb-podium-value--bronze { color: var(--lb-bronze); text-shadow: 0 0 18px rgba(255,136,68,0.4); }

  /* "YOU" badge */
  .lb-podium-you {
    position: absolute;
    top: 14px; right: 14px;
    padding: 5px 12px;
    background: linear-gradient(135deg, rgba(0,240,255,0.15) 0%, rgba(0,240,255,0.05) 100%);
    border: 1px solid rgba(0,240,255,0.4);
    border-radius: 8px;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 700;
    color: var(--lb-cyan);
    letter-spacing: 0.15em;
    text-shadow: 0 0 10px var(--lb-cyan);
    z-index: 5;
  }

  /* ═══════════════════════════════════════════════════════════════════
     FUTURISTIC RANKING TABLE
  ═══════════════════════════════════════════════════════════════════ */

  .lb-divider {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
  }

  .lb-divider__line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255,68,102,0.3) 20%,
      rgba(255,215,0,0.25) 50%,
      rgba(0,240,255,0.2) 80%,
      transparent 100%);
  }

  .lb-divider__label {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.35);
    white-space: nowrap;
    text-transform: uppercase;
  }

  /* Table header */
  .lb-list-header {
    display: grid;
    grid-template-columns: 60px 1fr 200px 180px;
    padding: 10px 24px 14px;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.25);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .lb-list-header span:last-child { text-align: right; }

  /* Row list */
  .lb-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 32px;
  }

  /* Individual row */
  .lb-row {
    position: relative;
    display: grid;
    grid-template-columns: 60px 1fr 200px 180px;
    align-items: center;
    padding: 16px 24px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.04);
    background: linear-gradient(135deg, rgba(15,12,28,0.6) 0%, rgba(10,8,20,0.8) 100%);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
    animation: row-slide-in 0.4s ease both;
  }

  @keyframes row-slide-in {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Stagger delays */
  .lb-row:nth-child(1) { animation-delay: 0ms; }
  .lb-row:nth-child(2) { animation-delay: 40ms; }
  .lb-row:nth-child(3) { animation-delay: 80ms; }
  .lb-row:nth-child(4) { animation-delay: 120ms; }
  .lb-row:nth-child(5) { animation-delay: 160ms; }
  .lb-row:nth-child(6) { animation-delay: 200ms; }
  .lb-row:nth-child(7) { animation-delay: 240ms; }
  .lb-row:nth-child(8) { animation-delay: 280ms; }
  .lb-row:nth-child(9) { animation-delay: 320ms; }
  .lb-row:nth-child(10) { animation-delay: 360ms; }

  /* Hover glow line */
  .lb-row::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--lb-cyan), var(--lb-magenta));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .lb-row:hover {
    background: linear-gradient(135deg, rgba(25,20,45,0.8) 0%, rgba(15,12,30,0.9) 100%);
    border-color: rgba(255,255,255,0.1);
    transform: translateX(6px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .lb-row:hover::before { opacity: 1; }

  /* Top 10 highlight */
  .lb-row--top10 {
    background: linear-gradient(135deg, rgba(0,240,255,0.04) 0%, rgba(0,200,255,0.01) 100%);
    border-color: rgba(0,240,255,0.08);
  }
  .lb-row--top10:hover {
    background: linear-gradient(135deg, rgba(0,240,255,0.08) 0%, rgba(0,200,255,0.03) 100%);
    border-color: rgba(0,240,255,0.15);
  }

  /* Current player highlight */
  .lb-row--me {
    background: linear-gradient(135deg, rgba(0,240,255,0.1) 0%, rgba(0,200,255,0.04) 100%) !important;
    border-color: rgba(0,240,255,0.35) !important;

                <span class="map-dropdown__item-name">Survival</span>

                <span class="map-dropdown__item-name">Hardcore</span>
                <span class="map-dropdown__item-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
              </button>
              <button class="map-dropdown__item" data-value="blitz" data-color="#FFDD00" role="option">
                <span class="map-dropdown__item-glow" style="--item-color: #FFDD00"></span>
                <span class="map-dropdown__item-icon" style="color: #FFDD00">⚡</span>
                <span class="map-dropdown__item-name">Blitz</span>
                <span class="map-dropdown__item-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
              </button>
              <button class="map-dropdown__item" data-value="siege" data-color="#FF8800" role="option">
                <span class="map-dropdown__item-glow" style="--item-color: #FF8800"></span>
                <span class="map-dropdown__item-icon" style="color: #FF8800">⛊</span>
                <span class="map-dropdown__item-name">Siege</span>
                <span class="map-dropdown__item-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
              </button>
            </div>

            <!-- Environment Maps -->
            <div class="map-dropdown__group">
              <div class="map-dropdown__group-label"><span>◉</span> ENVIRONMENTS</div>
              <button class="map-dropdown__item" data-value="frozen_tundra" data-color="#88DDFF" role="option">
                <span class="map-dropdown__item-glow" style="--item-color: #88DDFF"></span>
                <span class="map-dropdown__item-icon" style="color: #88DDFF">❄</span>
                <span class="map-dropdown__item-name">Frozen Tundra</span>
                <span class="map-dropdown__item-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
              </button>
              <button class="map-dropdown__item" data-value="ocean_depths" data-color="#0088FF" role="option">
                <span class="map-dropdown__item-glow" style="--item-color: #0088FF"></span>
                <span class="map-dropdown__item-icon" style="color: #0088FF">≋</span>
                <span class="map-dropdown__item-name">Ocean Depths</span>
                <span class="map-dropdown__item-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
              </button>
              <button class="map-dropdown__item" data-value="desert_sands" data-color="#FFCC66" role="option">
                <span class="map-dropdown__item-glow" style="--item-color: #FFCC66"></span>
                <span class="map-dropdown__item-icon" style="color: #FFCC66">☀</span>
                <span class="map-dropdown__item-name">Desert Sands</span>
                <span class="map-dropdown__item-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
              </button>
              <button class="map-dropdown__item" data-value="jungle" data-color="#44DD66" role="option">
                <span class="map-dropdown__item-glow" style="--item-color: #44DD66"></span>
                <span class="map-dropdown__item-icon" style="color: #44DD66">♣</span>
                <span class="map-dropdown__item-name">Jungle</span>
                <span class="map-dropdown__item-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
              </button>
            </div>

            <!-- Special Maps -->
            <div class="map-dropdown__group">
              <div class="map-dropdown__group-label"><span>★</span> SPECIAL</div>
              <button class="map-dropdown__item" data-value="lifemode" data-color="#FF66AA" role="option">
                <span class="map-dropdown__item-glow" style="--item-color: #FF66AA"></span>
                <span class="map-dropdown__item-icon" style="color: #FF66AA">♥</span>
                <span class="map-dropdown__item-name">Life Mode</span>
                <span class="map-dropdown__item-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
              </button>
              <button class="map-dropdown__item" data-value="robot_city" data-color="#AAAACC" role="option">
                <span class="map-dropdown__item-glow" style="--item-color: #AAAACC"></span>
                <span class="map-dropdown__item-icon" style="color: #AAAACC">⚙</span>
                <span class="map-dropdown__item-name">Robot City</span>
                <span class="map-dropdown__item-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
              </button>
              <button class="map-dropdown__item" data-value="campaign" data-color="#BB88FF" role="option">
                <span class="map-dropdown__item-glow" style="--item-color: #BB88FF"></span>
                <span class="map-dropdown__item-icon" style="color: #BB88FF">◆</span>
                <span class="map-dropdown__item-name">Campaign</span>
                <span class="map-dropdown__item-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></span>
              </button>
            </div>
          </div>

          <div class="map-dropdown__empty" id="mapDropdownEmpty" hidden>
            <span style="font-size:28px;opacity:0.3">◎</span>
            <span>No maps found</span>
          </div>
        </div>

        <div class="map-dropdown__backdrop" id="mapDropdownBackdrop"></div>
      </div>

      <select class="map-dropdown__hidden-select" id="lbMapSelect" aria-hidden="true" tabindex="-1" style="position:absolute;opacity:0;pointer-events:none;">
        <option value="neon_city" selected>Neon City</option>
        <option value="galactica">Galactica</option>
        <option value="lifemode">Life Mode</option>
        <option value="arena">Arena</option>
        <option value="zombie">Zombie</option>
        <option value="wasteland">Wasteland</option>
        <option value="robot_city">Robot City</option>
        <option value="campaign">Campaign</option>
        <option value="survival">Survival</option>
        <option value="hardcore">Hardcore</option>
        <option value="blitz">Blitz</option>
        <option value="siege">Siege</option>
        <option value="frozen_tundra">Frozen Tundra</option>
        <option value="ocean_depths">Ocean Depths</option>
        <option value="desert_sands">Desert Sands</option>
        <option value="jungle">Jungle</option>
      </select>
    </div>

    <!-- ══ Main content area ══════════════════════════════════════ -->
    <div class="lb-content" id="lbContent"></div>

  </div><!-- /.lb-page -->

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
  'use strict';

  Auth.mountNavbar();

  /* ══════════════════════════════════════════════════════════════════
     CURRENT PLAYER
  ══════════════════════════════════════════════════════════════════ */

  const _session = Auth.getSession();
  const _myName  = (_session?.name || '').toLowerCase();
  if (_myName) {
    document.getElementById('lbPlayerTag').hidden = false;
    document.getElementById('lbPlayerName').textContent = _session.name.toUpperCase();
  }

  /* ══════════════════════════════════════════════════════════════════
     BOARD CONFIGURATION
  ══════════════════════════════════════════════════════════════════ */

  const BOARDS = {
    kills:    { col: 'TOTAL KILLS',    fmt: v => v.toLocaleString() },
    waves:    { col: 'HIGHEST WAVE',   fmt: v => `Wave ${v}` },
    level:    { col: 'ACCOUNT LEVEL',  fmt: v => `Level ${v}` },
    nex:      { col: 'LIFETIME NEX',   fmt: v => `${(+v).toLocaleString()} ⬢` },
    campaign: { col: 'CAMPAIGN LEVEL', fmt: v => `Level ${v}` },
    map:      { col: 'MAP KILLS',      fmt: v => v.toLocaleString() },
  };

  /* ══════════════════════════════════════════════════════════════════
     CHARACTER LOOKUPS
  ══════════════════════════════════════════════════════════════════ */

  const CHAR_COLOR = {}, CHAR_NAME = {};
  CONFIG.CHARACTERS.forEach(c => {
    CHAR_COLOR[c.id] = c.color;
    CHAR_NAME[c.id]  = c.name.replace(/^THE /, '');
  });

  const EXTRA = {
    engineer:'Engineer', sniper_elite:'Sniper Elite', drone_pilot:'Drone Pilot',
    chemist:'Chemist', cyber_ninja:'Cyber Ninja', cyber_wolf:'Cyber Wolf',
    neon_panther:'Neon Panther', mecha_bulldog:'Mecha Bulldog',
    spider_drone:'Spider Drone', robo_hawk:'Robo Hawk', nano_rat:'Nano Rat',
    mini_bee:'Mini Bee', tank_commander:'Tank Cmdr', blade_dancer:'Blade Dancer',
    frost_walker:'Frost Walker', volt_runner:'Volt Runner', timebreaker:'Timebreaker',
    ai_avatar:'AI Avatar', overlord:'Overlord', electric_eel:'Elec. Eel',
    shadow_lord:'Shadow Lord', plasma_titan:'Plasma Titan',
    quantum_ghost:'Quantum Ghost', omega_prime:'Omega Prime',
  };

  function charLabel(id) {
    if (!id) return '—';
    return CHAR_NAME[id] || EXTRA[id] || id.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  }
  function charColor(id) { return CHAR_COLOR[id] || 'rgba(255,255,255,0.3)'; }
  function charInitial(id) {
    const n = charLabel(id);
    return n === '—' ? '?' : n[0].toUpperCase();
  }

  /* ══════════════════════════════════════════════════════════════════
     STATE
  ══════════════════════════════════════════════════════════════════ */

  const cache = {};
  let activeBoard = 'kills';

  /* ══════════════════════════════════════════════════════════════════
     DOM REFERENCES
  ══════════════════════════════════════════════════════════════════ */

  const content  = document.getElementById('lbContent');
  const errorEl  = document.getElementById('lbErrorEl');
  const errorMsg = document.getElementById('lbErrorMsg');
  const retryBtn = document.getElementById('lbRetryBtn');
  const mapRow   = document.getElementById('lbMapRow');
  const mapSel   = document.getElementById('lbMapSelect');

  /* ══════════════════════════════════════════════════════════════════
     CUSTOM DROPDOWN CONTROLLER
  ══════════════════════════════════════════════════════════════════ */

  const dropdown        = document.getElementById('mapDropdown');
  const trigger         = document.getElementById('mapDropdownTrigger');
  const panel           = document.getElementById('mapDropdownPanel');
  const selectedText    = document.getElementById('mapSelectedText');
  const searchInput     = document.getElementById('mapSearchInput');
  const listContainer   = document.getElementById('mapDropdownList');
  const emptyMsg        = document.getElementById('mapDropdownEmpty');
  const backdrop        = document.getElementById('mapDropdownBackdrop');

  function openDropdown() {
    dropdown.classList.add('open');
    trigger.setAttribute('aria-expanded', 'true');
    searchInput.value = '';
    filterItems('');
    setTimeout(() => searchInput.focus(), 100);
  }

  function closeDropdown() {
    dropdown.classList.remove('open');
    trigger.setAttribute('aria-expanded', 'false');
  }

  function filterItems(query) {
    const q = query.toLowerCase().trim();
    const items = listContainer.querySelectorAll('.map-dropdown__item');
    const groups = listContainer.querySelectorAll('.map-dropdown__group');
    let anyVisible = false;

    groups.forEach(group => {
      const groupItems = group.querySelectorAll('.map-dropdown__item');
      let groupHasVisible = false;

      groupItems.forEach(item => {
        const name = item.querySelector('.map-dropdown__item-name').textContent.toLowerCase();
        const match = !q || name.includes(q);
        item.style.display = match ? '' : 'none';
        if (match) { groupHasVisible = true; anyVisible = true; }
      });

      const label = group.querySelector('.map-dropdown__group-label');
      if (label) label.style.display = groupHasVisible ? '' : 'none';
    });

    emptyMsg.hidden = anyVisible;
  }

  function selectItem(value, text) {
    const items = listContainer.querySelectorAll('.map-dropdown__item');
    items.forEach(item => {
      item.classList.toggle('selected', item.dataset.value === value);
    });
    selectedText.textContent = text;
    mapSel.value = value;
    mapSel.dispatchEvent(new Event('change'));
    closeDropdown();
  }

  trigger.addEventListener('click', () => {
    dropdown.classList.contains('open') ? closeDropdown() : openDropdown();
  });

  backdrop.addEventListener('click', closeDropdown);

  searchInput.addEventListener('input', (e) => {
    filterItems(e.target.value);
  });

  listContainer.addEventListener('click', (e) => {
    const item = e.target.closest('.map-dropdown__item');
    if (item) selectItem(item.dataset.value, item.querySelector('.map-dropdown__item-name').textContent);
  });

  document.addEventListener('keydown', (e) => {
    if (!dropdown.classList.contains('open')) return;
    if (e.key === 'Escape') { closeDropdown(); trigger.focus(); }
  });

  document.addEventListener('click', (e) => {
    if (!dropdown.contains(e.target)) closeDropdown();
  });

  /* ══════════════════════════════════════════════════════════════════
     TAB SWITCHING
  ══════════════════════════════════════════════════════════════════ */

  document.querySelectorAll('.lb-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.lb-tab').forEach(t => {
        t.classList.remove('active');
        t.setAttribute('aria-selected', 'false');
      });
      tab.classList.add('active');
      tab.setAttribute('aria-selected', 'true');
      activeBoard = tab.dataset.board;
      mapRow.hidden = activeBoard !== 'map';
      errorEl.hidden = true;
      switchBoard(activeBoard);
    });
  });

  mapSel.addEventListener('change', () => {
    cache[`map_${mapSel.value}`] = null;
    switchBoard('map');
  });

  /* ══════════════════════════════════════════════════════════════════
     SWITCH BOARD
  ══════════════════════════════════════════════════════════════════ */

  async function switchBoard(board) {
    const key = board === 'map' ? `map_${mapSel.value}` : board;
    if (cache[key]) { renderBoard(cache[key], board); return; }

    renderLoading();
    try {
      const data = board === 'map'
        ? await API.getMapLeaderboard(mapSel.value)
        : await API.getLeaderboard(board);
      cache[key] = data.leaderboard || [];
      renderBoard(cache[key], board);
    } catch (err) {
      showError(err.message || 'Could not load leaderboard.');
    }
  }

  /* ══════════════════════════════════════════════════════════════════
     RENDER LOADING
  ══════════════════════════════════════════════════════════════════ */

  function renderLoading() {
    content.innerHTML = `
      <div class="lb-loading">
        <div class="lb-spinner"></div>
        <span class="lb-loading-text">LOADING RANKINGS…</span>
      </div>`;
  }

  /* ══════════════════════════════════════════════════════════════════
     RENDER BOARD
  ══════════════════════════════════════════════════════════════════ */

  function renderBoard(rows, board) {
    content.innerHTML = '';

    if (!rows || rows.length === 0) {
      content.innerHTML = `
        <div class="lb-empty">
          <span class="lb-empty__glyph">◎</span>
          <div class="lb-empty__title">NO PLAYERS YET</div>
          <div class="lb-empty__sub">Be the first to make it onto this board!</div>
        </div>`;
      return;
    }

    const cfg   = BOARDS[board] || BOARDS.kills;
    const top3  = rows.slice(0, 3);
    const rest  = rows.slice(3);
    let myRank  = null;

    rows.forEach(r => { if (_myName && r.name?.toLowerCase() === _myName) myRank = r.rank; });

    const wrap = document.createElement('div');
    wrap.style.animation = 'podium-appear 0.5s ease';

    /* ── Podium ── */
    if (top3.length > 0) {
      const podium = document.createElement('div');
      podium.className = 'lb-podium';

      const medals = ['gold', 'silver', 'bronze'];
      const icons  = ['👑', '🥈', '🥉'];

      top3.forEach((row, i) => {
        const m = medals[i];
        const isMe = _myName && row.name?.toLowerCase() === _myName;

        const card = document.createElement('div');
        card.className = `lb-podium-card lb-podium-card--${m}`;

        if (isMe) {
          const youBadge = document.createElement('span');
          youBadge.className = 'lb-podium-you';
          youBadge.textContent = 'YOU';
          card.appendChild(youBadge);
        }

        const medal = document.createElement('div');
        medal.className = 'lb-podium-medal';
        medal.textContent = icons[i];
        medal.style.color = m === 'gold' ? '#FFD700' : m === 'silver' ? '#B0C4DE' : '#FF8844';

        const avatar = document.createElement('div');
        avatar.className = `lb-podium-avatar lb-podium-avatar--${m}`;
        avatar.textContent = charInitial(row.character);

        const info = document.createElement('div');
        info.className = 'lb-podium-info';

        const name = document.createElement('div');
        name.className = `lb-podium-name lb-podium-name--${m}`;
        name.textContent = row.name || 'Unknown';

        const charDiv = document.createElement('div');
        charDiv.className = 'lb-podium-char';
        const dot = document.createElement('span');
        dot.className = 'lb-podium-char-dot';
        dot.style.background = charColor(row.character);
        dot.style.boxShadow = `0 0 8px ${charColor(row.character)}`;
        charDiv.appendChild(dot);
        charDiv.appendChild(document.createTextNode(charLabel(row.character)));

        const val = document.createElement('div');
        val.className = `lb-podium-value lb-podium-value--${m}`;
        val.textContent = cfg.fmt(row.value);

        info.appendChild(name);
        info.appendChild(charDiv);
        info.appendChild(val);

        card.appendChild(medal);
        card.appendChild(avatar);
        card.appendChild(info);
        podium.appendChild(card);
      });

      wrap.appendChild(podium);
    }

    /* ── Rest of rankings ── */
    if (rest.length > 0) {
      const divider = document.createElement('div');
      divider.className = 'lb-divider';
      divider.innerHTML = `
        <span class="lb-divider__line"></span>
        <span class="lb-divider__label">FULL RANKINGS</span>
        <span class="lb-divider__line"></span>`;
      wrap.appendChild(divider);

      const header = document.createElement('div');
      header.className = 'lb-list-header';
      header.innerHTML = `<span>#</span><span>PLAYER</span><span>CHARACTER</span><span>${cfg.col}</span>`;
      wrap.appendChild(header);

      const list = document.createElement('div');
      list.className = 'lb-list';

      rest.forEach(row => {
        const isMe   = _myName && row.name?.toLowerCase() === _myName;
        const isTop10 = row.rank <= 10;

        const r = document.createElement('div');
        r.className = 'lb-row';
        if (isTop10) r.classList.add('lb-row--top10');
        if (isMe) r.classList.add('lb-row--me');

        const rank = document.createElement('span');
        rank.className = 'lb-row__rank';
        rank.textContent = row.rank;

        const nameCell = document.createElement('span');
        nameCell.className = 'lb-row__name';
        nameCell.textContent = row.name || 'Unknown';
        if (isMe) {
          const tag = document.createElement('span');
          tag.className = 'lb-you-tag';
          tag.textContent = 'YOU';
          nameCell.appendChild(tag);
        }

        const charCell = document.createElement('span');
        charCell.className = 'lb-row__char';
        const charDot = document.createElement('span');
        charDot.className = 'lb-char-dot';
        charDot.style.background = charColor(row.character);
        charCell.appendChild(charDot);
        charCell.appendChild(document.createTextNode(charLabel(row.character)));

        const valCell = document.createElement('span');
        valCell.className = 'lb-row__val';
        valCell.textContent = cfg.fmt(row.value);

        r.appendChild(rank);
        r.appendChild(nameCell);
        r.appendChild(charCell);
        r.appendChild(valCell);
        list.appendChild(r);
      });

      wrap.appendChild(list);
    }

    /* ── Not ranked banner ── */
    if (_myName && myRank === null) {
      const banner = document.createElement('div');
      banner.className = 'lb-not-ranked';
      banner.textContent = `You're not ranked on this board yet. Keep playing to earn your spot!`;
      wrap.appendChild(banner);
    }

    content.appendChild(wrap);
  }

  /* ══════════════════════════════════════════════════════════════════
     ERROR HANDLING
  ══════════════════════════════════════════════════════════════════ */

  function showError(msg) {
    errorMsg.textContent = msg;
    errorEl.hidden = false;
  }

  retryBtn.addEventListener('click', () => {
    errorEl.hidden = true;
    switchBoard(activeBoard);
  });

  /* ══════════════════════════════════════════════════════════════════
     INITIALIZE
  ══════════════════════════════════════════════════════════════════ */

  switchBoard(activeBoard);
  </script>
