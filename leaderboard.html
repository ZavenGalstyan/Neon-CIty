<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DASH DREAD — Leaderboards</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
  /* ══════════════════════════════════════════════════════
     LEADERBOARD — Premium Cyberpunk UI
     Breakpoints: 1440, 1024, 768, 480, 360
  ══════════════════════════════════════════════════════ */

  :root {
    --lb-gold: #FFD700;
    --lb-gold-dim: rgba(255,215,0,0.15);
    --lb-silver: #C0C0C0;
    --lb-silver-dim: rgba(192,192,192,0.12);
    --lb-bronze: #CD7F32;
    --lb-bronze-dim: rgba(205,127,50,0.12);
    --lb-glow-pink: rgba(255,68,102,0.25);
    --lb-glow-cyan: rgba(68,238,255,0.25);
    --lb-surface: rgba(13,13,26,0.85);
    --lb-surface-hover: rgba(255,255,255,0.06);
    --lb-border: rgba(255,255,255,0.08);
    --lb-border-active: rgba(255,68,102,0.5);
  }

  /* ── Page wrapper ───────────────────────────────────────── */
  .lb-page {
    min-height: 100vh;
    padding: 0 0 100px;
    position: relative;
    z-index: 1;
  }

  /* ── Ambient orbs (subtle background glow) ──────────────── */
  body { position: relative; }
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    filter: blur(140px);
    will-change: transform;
  }
  body::before {
    width: 700px; height: 700px;
    top: -200px; left: -100px;
    background: radial-gradient(circle, rgba(255,68,102,0.10) 0%, transparent 60%);
    animation: lb-orb-a 25s ease-in-out infinite alternate;
  }
  body::after {
    width: 500px; height: 500px;
    bottom: -80px; right: -60px;
    background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, transparent 60%);
    animation: lb-orb-b 30s ease-in-out infinite alternate;
  }
  @keyframes lb-orb-a {
    from { transform: translate(0,0) scale(1); opacity: 0.7; }
    to   { transform: translate(60px,40px) scale(1.15); opacity: 1; }
  }
  @keyframes lb-orb-b {
    from { transform: translate(0,0) scale(1); opacity: 0.6; }
    to   { transform: translate(-50px,-40px) scale(1.1); opacity: 0.9; }
  }

  /* ── Hero header ─────────────────────────────────────────── */
  .lb-hero {
    position: relative;
    text-align: center;
    padding: 64px 32px 44px;
    overflow: hidden;
    background: radial-gradient(ellipse 100% 80% at 50% -20%, rgba(255,68,102,0.08) 0%, transparent 60%);
  }
  .lb-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,68,102,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .lb-hero-eyebrow {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.4em;
    color: var(--pink);
    text-shadow: 0 0 20px rgba(255,68,102,0.6);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .lb-hero-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(32px, 6vw, 58px);
    font-weight: 900;
    letter-spacing: 0.1em;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, #FF4466 45%, #FFD700 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 14px;
    filter: drop-shadow(0 0 30px rgba(255,68,102,0.3));
    animation: title-glow 4s ease-in-out infinite alternate;
  }
  @keyframes title-glow {
    from { filter: drop-shadow(0 0 25px rgba(255,68,102,0.2)); }
    to   { filter: drop-shadow(0 0 50px rgba(255,68,102,0.4)); }
  }

  .lb-hero-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── Player signed-in tag ───────────────────────────────── */
  .lb-player-tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 22px;
    background: rgba(68,238,255,0.06);
    border: 1px solid rgba(68,238,255,0.2);
    border-radius: 999px;
    margin-top: 22px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 0.12em;
    box-shadow: 0 0 24px rgba(68,238,255,0.1);
    transition: all 0.3s ease;
  }
  .lb-player-tag:hover {
    background: rgba(68,238,255,0.1);
    box-shadow: 0 0 32px rgba(68,238,255,0.18);
  }
  .lb-player-tag__dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 10px var(--cyan);
    animation: lb-pulse 2s ease-in-out infinite;
  }
  @keyframes lb-pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%     { opacity: 0.4; transform: scale(0.65); }
  }

  /* ── Error banner ───────────────────────────────────────── */
  .lb-error {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 0 auto 24px;
    max-width: 960px;
    padding: 16px 24px;
    background: rgba(255,68,102,0.06);
    border: 1px solid rgba(255,68,102,0.2);
    border-radius: 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--pink);
    backdrop-filter: blur(10px);
  }
  .lb-error__retry {
    margin-left: auto;
    padding: 10px 20px;
    min-height: 44px;
    background: rgba(255,68,102,0.12);
    border: 1px solid rgba(255,68,102,0.35);
    border-radius: 8px;
    color: var(--pink);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .lb-error__retry:hover {
    background: rgba(255,68,102,0.22);
    transform: translateY(-1px);
  }
  .lb-error__retry:active { transform: translateY(0); }

  /* ══════════════════════════════════════════════════════
     TAB BAR — Scrollable horizontal tabs
  ══════════════════════════════════════════════════════ */
  .lb-tabs-wrapper {
    position: relative;
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px 32px;
  }
  .lb-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .lb-tab {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 12px 24px;
    min-height: 44px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--lb-border);
    border-radius: 100px;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    white-space: nowrap;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .lb-tab:hover {
    background: var(--lb-surface-hover);
    color: var(--text);
    border-color: rgba(255,255,255,0.15);
    transform: translateY(-2px);
  }
  .lb-tab:active {
    transform: translateY(0);
  }
  .lb-tab.active {
    background: rgba(255,68,102,0.1);
    border-color: var(--lb-border-active);
    color: #fff;
    box-shadow:
      0 0 28px rgba(255,68,102,0.2),
      inset 0 0 20px rgba(255,68,102,0.05);
    text-shadow: 0 0 12px rgba(255,68,102,0.5);
  }
  .lb-tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 40%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--pink), transparent);
    border-radius: 2px;
  }
  .lb-tab__icon {
    font-size: 13px;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  .lb-tab.active .lb-tab__icon,
  .lb-tab:hover .lb-tab__icon { opacity: 1; }

  /* Disabled tab state */
  .lb-tab[disabled] {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* ── Map selector row (now uses custom dropdown) ─────────── */
  /* Styles moved to custom dropdown section below */

  /* ── Content area ───────────────────────────────────────── */
  .lb-content {
    max-width: 1040px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── Loading state ──────────────────────────────────────── */
  .lb-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 100px 24px;
  }
  .lb-loading-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.25em;
    color: var(--muted);
  }
  .lb-spinner {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 3px solid rgba(255,68,102,0.1);
    border-top-color: var(--pink);
    animation: lb-spin 0.75s linear infinite;
  }
  @keyframes lb-spin { to { transform: rotate(360deg); } }

  @keyframes lb-fade-in {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ══════════════════════════════════════════════════════
     PODIUM — Top 3 players
  ══════════════════════════════════════════════════════ */
  .lb-podium {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 16px;
    margin-bottom: 48px;
    padding: 0 12px;
    animation: lb-fade-in 0.4s ease both;
  }

  .lb-podium-card {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    border-radius: 20px;
    padding: 28px 20px 24px;
    border: 1px solid;
    overflow: hidden;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
    flex: 1;
    max-width: 280px;
    min-width: 180px;
    cursor: default;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .lb-podium-card:hover { transform: translateY(-6px); }

  /* Shimmer line at top */
  .lb-podium-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  /* Subtle glow bg */
  .lb-podium-card::after {
    content: '';
    position: absolute;
    top: -50%; left: -25%;
    width: 150%; height: 100%;
    border-radius: 50%;
    opacity: 0.06;
    pointer-events: none;
  }

  /* Gold — 1st place */
  .lb-podium-card--gold {
    background: linear-gradient(165deg, rgba(255,215,0,0.12) 0%, rgba(255,215,0,0.03) 100%);
    border-color: rgba(255,215,0,0.4);
    box-shadow:
      0 0 60px rgba(255,215,0,0.15),
      0 16px 48px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,215,0,0.2);
    order: 2;
    transform: translateY(-24px);
    padding-top: 36px;
    animation: podium-gold-pulse 4s ease-in-out infinite alternate;
  }
  .lb-podium-card--gold::before { background: linear-gradient(90deg, transparent, #FFD700, transparent); }
  .lb-podium-card--gold::after  { background: #FFD700; }
  .lb-podium-card--gold:hover   { transform: translateY(-30px); }
  @keyframes podium-gold-pulse {
    from { box-shadow: 0 0 50px rgba(255,215,0,0.12), 0 16px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,215,0,0.2); }
    to   { box-shadow: 0 0 90px rgba(255,215,0,0.25), 0 16px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,215,0,0.3); }
  }

  /* Silver — 2nd place */
  .lb-podium-card--silver {
    background: linear-gradient(165deg, rgba(192,192,192,0.1) 0%, rgba(192,192,192,0.02) 100%);
    border-color: rgba(192,192,192,0.3);
    box-shadow: 0 0 40px rgba(192,192,192,0.1), 0 12px 36px rgba(0,0,0,0.45);
    order: 1;
  }
  .lb-podium-card--silver::before { background: linear-gradient(90deg, transparent, #C0C0C0, transparent); }
  .lb-podium-card--silver::after  { background: #C0C0C0; }

  /* Bronze — 3rd place */
  .lb-podium-card--bronze {
    background: linear-gradient(165deg, rgba(205,127,50,0.1) 0%, rgba(205,127,50,0.02) 100%);
    border-color: rgba(205,127,50,0.3);
    box-shadow: 0 0 40px rgba(205,127,50,0.1), 0 12px 36px rgba(0,0,0,0.45);
    order: 3;
  }
  .lb-podium-card--bronze::before { background: linear-gradient(90deg, transparent, #CD7F32, transparent); }
  .lb-podium-card--bronze::after  { background: #CD7F32; }

  .lb-podium-medal {
    font-size: 36px;
    margin-bottom: 14px;
    filter: drop-shadow(0 0 12px currentColor);
  }
  .lb-podium-card--gold .lb-podium-medal {
    animation: crown-float 2.5s ease-in-out infinite;
  }
  @keyframes crown-float {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-6px); }
  }

  .lb-podium-avatar {
    width: 60px; height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 900;
    border: 2px solid;
    margin-bottom: 14px;
    flex-shrink: 0;
    transition: transform 0.2s ease;
  }
  .lb-podium-card:hover .lb-podium-avatar { transform: scale(1.05); }
  .lb-podium-avatar--gold   { border-color: rgba(255,215,0,0.6); background: rgba(255,215,0,0.1); color: #FFD700; }
  .lb-podium-avatar--silver { border-color: rgba(192,192,192,0.5); background: rgba(192,192,192,0.08); color: #C0C0C0; }
  .lb-podium-avatar--bronze { border-color: rgba(205,127,50,0.5); background: rgba(205,127,50,0.08); color: #CD7F32; }

  .lb-podium-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-align: center;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 6px;
  }
  .lb-podium-name--gold   { color: #FFD700; text-shadow: 0 0 18px rgba(255,215,0,0.5); }
  .lb-podium-name--silver { color: #D4D4D4; text-shadow: 0 0 12px rgba(192,192,192,0.4); }
  .lb-podium-name--bronze { color: #E09050; text-shadow: 0 0 12px rgba(205,127,50,0.4); }

  /* Info wrapper (for mobile horizontal layout) */
  .lb-podium-info {
    display: contents; /* Desktop: children flow normally in column */
  }

  .lb-podium-char {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .lb-podium-char-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .lb-podium-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 0.05em;
    text-align: center;
  }
  .lb-podium-value--gold   { color: #FFD700; text-shadow: 0 0 16px rgba(255,215,0,0.4); }
  .lb-podium-value--silver { color: #D4D4D4; text-shadow: 0 0 12px rgba(192,192,192,0.3); }
  .lb-podium-value--bronze { color: #E09050; text-shadow: 0 0 12px rgba(205,127,50,0.3); }

  .lb-podium-you {
    position: absolute;
    top: 12px; right: 12px;
    padding: 4px 10px;
    background: rgba(68,238,255,0.12);
    border: 1px solid rgba(68,238,255,0.35);
    border-radius: 6px;
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 0.14em;
    text-shadow: 0 0 8px rgba(68,238,255,0.5);
  }

  /* ══════════════════════════════════════════════════════
     RANKS LIST — Rows 4-50
  ══════════════════════════════════════════════════════ */
  .lb-divider {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 20px;
  }
  .lb-divider__line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,68,102,0.25) 40%, rgba(255,215,0,0.2) 60%, transparent);
  }
  .lb-divider__label {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.25em;
    color: var(--muted);
    white-space: nowrap;
  }

  .lb-list-header {
    display: grid;
    grid-template-columns: 56px 1fr 180px 180px;
    padding: 8px 20px 12px;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.25);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .lb-list-header span:last-child { text-align: right; }

  .lb-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 28px;
  }

  .lb-row {
    display: grid;
    grid-template-columns: 56px 1fr 180px 180px;
    align-items: center;
    padding: 14px 20px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.04);
    background: rgba(255,255,255,0.02);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    animation: lb-row-in 0.35s ease both;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  @keyframes lb-row-in {
    from { opacity: 0; transform: translateX(-12px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .lb-row:hover {
    background: var(--lb-surface-hover);
    border-color: rgba(255,255,255,0.1);
    transform: translateX(4px);
  }

  /* Top 10 highlight */
  .lb-row--top10 {
    background: rgba(68,238,255,0.025);
    border-color: rgba(68,238,255,0.06);
  }
  .lb-row--top10:hover {
    background: rgba(68,238,255,0.055);
    border-color: rgba(68,238,255,0.12);
  }

  /* Current user highlight */
  .lb-row--me {
    background: rgba(68,238,255,0.06) !important;
    border-color: rgba(68,238,255,0.25) !important;
    box-shadow: inset 3px 0 0 var(--cyan), 0 0 28px rgba(68,238,255,0.06) !important;
  }
  .lb-row--me:hover {
    background: rgba(68,238,255,0.09) !important;
  }

  /* Row stagger animation */
  .lb-row:nth-child(1)  { animation-delay:   0ms }
  .lb-row:nth-child(2)  { animation-delay:  30ms }
  .lb-row:nth-child(3)  { animation-delay:  60ms }
  .lb-row:nth-child(4)  { animation-delay:  90ms }
  .lb-row:nth-child(5)  { animation-delay: 120ms }
  .lb-row:nth-child(6)  { animation-delay: 150ms }
  .lb-row:nth-child(7)  { animation-delay: 180ms }
  .lb-row:nth-child(8)  { animation-delay: 210ms }
  .lb-row:nth-child(9)  { animation-delay: 240ms }
  .lb-row:nth-child(10) { animation-delay: 270ms }

  /* Rank badge */
  .lb-row__rank {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.02em;
    transition: all 0.2s ease;
  }
  .lb-row--top10 .lb-row__rank {
    background: rgba(68,238,255,0.08);
    border-color: rgba(68,238,255,0.2);
    color: var(--cyan);
    box-shadow: 0 0 12px rgba(68,238,255,0.08);
  }
  .lb-row--me .lb-row__rank { color: var(--cyan); }

  /* Player name */
  .lb-row__name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
    overflow: hidden;
  }
  .lb-row--me .lb-row__name { color: var(--cyan); }

  .lb-you-tag {
    padding: 3px 9px;
    background: rgba(68,238,255,0.1);
    border: 1px solid rgba(68,238,255,0.25);
    border-radius: 5px;
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 0.12em;
    flex-shrink: 0;
    text-shadow: 0 0 8px rgba(68,238,255,0.5);
  }

  /* Character column */
  .lb-row__char {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    overflow: hidden;
  }
  .lb-char-dot {
    width: 9px; height: 9px;
    border-radius: 50%;

  /* Value column */

  .lb-row--top10 .lb-row__val { text-shadow: 0 0 16px rgba(68,238,255,0.4); }

  /* ── Not ranked banner ──────────────────────────────────── */

  @media (max-width: 360px) {

    .lb-podium { gap: 8px; padding: 0; margin-bottom: 28px; }

    .lb-podium-medal { font-size: 22px; }
    .lb-podium-avatar { width: 34px; height: 34px; font-size: 12px; }

    .lb-podium-value { font-size: 12px; }
    .lb-podium-you { font-size: 5px; padding: 2px 5px; top: 5px; right: 5px; border-radius: 4px; }

    .lb-divider { gap: 10px; margin-bottom: 12px; }
    .lb-divider__label { font-size: 8px; letter-spacing: 0.15em; }

    .lb-list-header {
      grid-template-columns: 36px 1fr 80px;
      padding: 4px 10px 6px;

      letter-spacing: 0.15em;

      grid-template-columns: 36px 1fr 80px;
      padding: 10px 10px;
      border-radius: 8px;
      gap: 6px;
    }

    .lb-row__name { font-size: 13px; gap: 5px; }

    .lb-empty { padding: 60px 16px; }
    .lb-empty__glyph { font-size: 48px; margin-bottom: 16px; }
    .lb-empty__title { font-size: 14px; }
    .lb-empty__sub { font-size: 13px; }

    .lb-loading { padding: 60px 16px; gap: 16px; }
    .lb-spinner { width: 36px; height: 36px; }
    .lb-loading-text { font-size: 10px; letter-spacing: 0.2em; }
  }

  /* ── Touch-friendly: ensure minimum tap targets ─────────── */
  @media (pointer: coarse) {
    .lb-tab,
    .lb-error__retry,
    .lb-map-select { min-height: 44px; }
    .lb-row { min-height: 52px; }
  }

  /* ── Reduced motion preference ──────────────────────────── */
  @media (prefers-reduced-motion: reduce) {
    .lb-hero-title,
    .lb-podium-medal,
    .lb-podium-card--gold,
    .lb-player-tag__dot,
    .lb-spinner,
    body::before,
    body::after { animation: none; }
    .lb-row,
    .lb-podium-card,
    .lb-tab { transition-duration: 0.1s; }
  }

  /* ══════════════════════════════════════════════════════════
     CUSTOM MAP DROPDOWN — Premium Cyberpunk Style
  ══════════════════════════════════════════════════════════ */

  .lb-map-row {
    display: flex;
    justify-content: center;
    padding: 0 24px 32px;
  }

  .map-dropdown {
    position: relative;
    width: 100%;
    max-width: 320px;
    z-index: 100;
  }

  .map-dropdown__hidden-select {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    width: 0;
    height: 0;
  }

  /* ── Trigger Button ─────────────────────────────────────── */
  .map-dropdown__trigger {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 14px 20px;
    min-height: 52px;
    background:
      linear-gradient(135deg, rgba(13,13,26,0.95) 0%, rgba(20,15,35,0.95) 100%);
    border: 1px solid transparent;
    border-radius: 14px;
    cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #fff;
    text-align: left;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

    /* Gradient border */
    background-clip: padding-box;
    box-shadow:
      0 0 0 1px rgba(255,68,102,0.25),
      0 4px 24px rgba(0,0,0,0.4),
      0 0 40px rgba(255,68,102,0.05),
      inset 0 1px 0 rgba(255,255,255,0.05);
  }

  /* Noise texture overlay */
  .map-dropdown__trigger::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    border-radius: inherit;
  }

  /* Top shimmer line */
  .map-dropdown__trigger::after {
    content: '';
    position: absolute;
    top: 0;
    left: 20%;
    right: 20%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,68,102,0.5), rgba(255,200,100,0.3), transparent);
    opacity: 0.6;
  }

  .map-dropdown__trigger:hover {
    box-shadow:
      0 0 0 1px rgba(255,68,102,0.45),
      0 6px 32px rgba(0,0,0,0.5),
      0 0 60px rgba(255,68,102,0.1),
      inset 0 1px 0 rgba(255,255,255,0.08);
    transform: translateY(-1px);
  }

  .map-dropdown__trigger:focus {
    outline: none;
    box-shadow:
      0 0 0 2px rgba(255,68,102,0.6),
      0 0 0 4px rgba(255,68,102,0.15),
      0 6px 32px rgba(0,0,0,0.5),
      0 0 80px rgba(255,68,102,0.15),
      inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .map-dropdown.open .map-dropdown__trigger {
    box-shadow:
      0 0 0 2px rgba(255,68,102,0.5),
      0 8px 40px rgba(0,0,0,0.6),
      0 0 100px rgba(255,68,102,0.12),
      inset 0 1px 0 rgba(255,255,255,0.1);
    border-radius: 14px 14px 0 0;
  }

  .map-dropdown__icon {
    font-size: 18px;
    color: var(--pink);
    text-shadow: 0 0 12px rgba(255,68,102,0.6);
    flex-shrink: 0;
    transition: all 0.3s ease;
  }

  .map-dropdown__trigger:hover .map-dropdown__icon {
    text-shadow: 0 0 20px rgba(255,68,102,0.9);
    transform: scale(1.1);
  }

  .map-dropdown__selected {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .map-dropdown__arrow {
    width: 18px;
    height: 18px;
    color: var(--muted);
    flex-shrink: 0;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), color 0.2s;
  }

  .map-dropdown.open .map-dropdown__arrow {
    transform: rotate(180deg);
    color: var(--pink);
  }

  /* ── Dropdown Panel ─────────────────────────────────────── */
  .map-dropdown__panel {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    margin-top: -1px;
    background:
      linear-gradient(180deg, rgba(15,12,30,0.98) 0%, rgba(10,8,22,0.99) 100%);
    border: 1px solid rgba(255,68,102,0.3);
    border-top: none;
    border-radius: 0 0 14px 14px;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.7),
      0 0 80px rgba(255,68,102,0.08),
      inset 0 -1px 0 rgba(255,255,255,0.03);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    overflow: hidden;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px) scaleY(0.95);
    transform-origin: top center;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 101;
  }

  /* Noise overlay */
  .map-dropdown__panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
  }

  .map-dropdown.open .map-dropdown__panel {
    opacity: 1;
    visibility: visible;
    transform: translateY(0) scaleY(1);
  }

  /* ── Search Input ───────────────────────────────────────── */
  .map-dropdown__search {
    position: relative;
    padding: 12px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .map-dropdown__search-icon {
    position: absolute;
    left: 26px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--muted);
    pointer-events: none;
  }

  .map-dropdown__search-input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    transition: all 0.2s ease;
  }

  .map-dropdown__search-input::placeholder {
    color: rgba(255,255,255,0.3);
  }

  .map-dropdown__search-input:focus {
    outline: none;
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,68,102,0.4);
    box-shadow: 0 0 20px rgba(255,68,102,0.08);
  }

  /* ── List Container ─────────────────────────────────────── */
  .map-dropdown__list {
    max-height: 320px;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 8px 0;

    /* Custom scrollbar */
    scrollbar-width: thin;
    scrollbar-color: rgba(255,68,102,0.4) rgba(255,255,255,0.03);
  }

  .map-dropdown__list::-webkit-scrollbar {
    width: 6px;
  }

  .map-dropdown__list::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.03);
    border-radius: 3px;
  }

  .map-dropdown__list::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(255,68,102,0.5), rgba(255,150,100,0.4));
    border-radius: 3px;
    box-shadow: 0 0 8px rgba(255,68,102,0.3);
  }

  .map-dropdown__list::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, rgba(255,68,102,0.7), rgba(255,150,100,0.6));
  }

  /* ── Group Labels ───────────────────────────────────────── */
  .map-dropdown__group {
    padding: 4px 0;
  }

  .map-dropdown__group:not(:first-child) {
    border-top: 1px solid rgba(255,255,255,0.04);
    margin-top: 4px;
    padding-top: 8px;
  }

  .map-dropdown__group-label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px 6px;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }

  .map-dropdown__group-icon {
    font-size: 10px;
    opacity: 0.6;
  }

  /* ── Dropdown Items ─────────────────────────────────────── */
  .map-dropdown__item {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 12px 18px;
    min-height: 48px;
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.8);
    text-align: left;
    transition: all 0.2s ease;
    overflow: hidden;

    /* Stagger animation */
    opacity: 0;
    transform: translateX(-10px);
  }

  .map-dropdown.open .map-dropdown__item {
    opacity: 1;
    transform: translateX(0);
  }

  /* Staggered entrance */
  .map-dropdown.open .map-dropdown__group:nth-child(1) .map-dropdown__item:nth-child(2) { transition-delay: 0.02s; }
  .map-dropdown.open .map-dropdown__group:nth-child(1) .map-dropdown__item:nth-child(3) { transition-delay: 0.04s; }
  .map-dropdown.open .map-dropdown__group:nth-child(1) .map-dropdown__item:nth-child(4) { transition-delay: 0.06s; }
  .map-dropdown.open .map-dropdown__group:nth-child(1) .map-dropdown__item:nth-child(5) { transition-delay: 0.08s; }
  .map-dropdown.open .map-dropdown__group:nth-child(2) .map-dropdown__item:nth-child(2) { transition-delay: 0.10s; }
  .map-dropdown.open .map-dropdown__group:nth-child(2) .map-dropdown__item:nth-child(3) { transition-delay: 0.12s; }
  .map-dropdown.open .map-dropdown__group:nth-child(2) .map-dropdown__item:nth-child(4) { transition-delay: 0.14s; }
  .map-dropdown.open .map-dropdown__group:nth-child(3) .map-dropdown__item:nth-child(2) { transition-delay: 0.16s; }
  .map-dropdown.open .map-dropdown__group:nth-child(3) .map-dropdown__item:nth-child(3) { transition-delay: 0.18s; }
  .map-dropdown.open .map-dropdown__group:nth-child(3) .map-dropdown__item:nth-child(4) { transition-delay: 0.20s; }
  .map-dropdown.open .map-dropdown__group:nth-child(4) .map-dropdown__item:nth-child(2) { transition-delay: 0.22s; }
  .map-dropdown.open .map-dropdown__group:nth-child(4) .map-dropdown__item:nth-child(3) { transition-delay: 0.24s; }
  .map-dropdown.open .map-dropdown__group:nth-child(4) .map-dropdown__item:nth-child(4) { transition-delay: 0.26s; }

    <!-- ── Main content ──────────────────────────────────── -->
    <div class="lb-content" id="lbContent"></div>

  </div><!-- /.lb-page -->

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
  'use strict';

  Auth.mountNavbar();

  /* ── Current player ─────────────────────────────────── */
  const _session = Auth.getSession();
  const _myName  = (_session?.name || '').toLowerCase();
  if (_myName) {
    document.getElementById('lbPlayerTag').hidden = false;
    document.getElementById('lbPlayerName').textContent = _session.name.toUpperCase();
  }

  /* ── Board config ────────────────────────────────────── */
  const BOARDS = {
    kills:    { col: 'TOTAL KILLS',    fmt: v => v.toLocaleString()                 },
    waves:    { col: 'HIGHEST WAVE',   fmt: v => `Wave ${v}`                        },
    level:    { col: 'ACCOUNT LEVEL',  fmt: v => `Level ${v}`                       },
    nex:      { col: 'LIFETIME NEX',   fmt: v => `${(+v).toLocaleString()} ⬢`       },
    campaign: { col: 'CAMPAIGN LEVEL', fmt: v => `Level ${v}`                       },
    map:      { col: 'MAP KILLS',      fmt: v => v.toLocaleString()                 },
  };

  /* ── Character lookups ───────────────────────────────── */
  const CHAR_COLOR = {}, CHAR_NAME = {};
  CONFIG.CHARACTERS.forEach(c => {
    CHAR_COLOR[c.id] = c.color;
    CHAR_NAME[c.id]  = c.name.replace(/^THE /, '');
  });
  const EXTRA = {
    engineer:'Engineer', sniper_elite:'Sniper Elite', drone_pilot:'Drone Pilot',
    chemist:'Chemist', cyber_ninja:'Cyber Ninja', cyber_wolf:'Cyber Wolf',
    neon_panther:'Neon Panther', mecha_bulldog:'Mecha Bulldog',
    spider_drone:'Spider Drone', robo_hawk:'Robo Hawk', nano_rat:'Nano Rat',
    mini_bee:'Mini Bee', tank_commander:'Tank Cmdr', blade_dancer:'Blade Dancer',
    frost_walker:'Frost Walker', volt_runner:'Volt Runner', timebreaker:'Timebreaker',
    ai_avatar:'AI Avatar', overlord:'Overlord', electric_eel:'Elec. Eel',
    shadow_lord:'Shadow Lord', plasma_titan:'Plasma Titan',
    quantum_ghost:'Quantum Ghost', omega_prime:'Omega Prime',
  };
  function charLabel(id) {
    if (!id) return '—';
    return CHAR_NAME[id] || EXTRA[id] || id.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  }
  function charColor(id) { return CHAR_COLOR[id] || 'rgba(255,255,255,0.3)'; }
  function charInitial(id) {
    const n = charLabel(id);
    return n === '—' ? '?' : n[0].toUpperCase();
  }

  /* ── State ───────────────────────────────────────────── */
  const cache = {};
  let activeBoard = 'kills';

  /* ── DOM ─────────────────────────────────────────────── */
  const content  = document.getElementById('lbContent');
  const errorEl  = document.getElementById('lbErrorEl');
  const errorMsg = document.getElementById('lbErrorMsg');
  const retryBtn = document.getElementById('lbRetryBtn');
  const mapRow   = document.getElementById('lbMapRow');
  const mapSel   = document.getElementById('lbMapSelect');

  /* ── Tabs ────────────────────────────────────────────── */
  document.querySelectorAll('.lb-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeBoard = tab.dataset.board;
      mapRow.hidden = activeBoard !== 'map';
      errorEl.hidden = true;
      switchBoard(activeBoard);
    });
  });

  mapSel.addEventListener('change', () => {
    cache[`map_${mapSel.value}`] = null;
    switchBoard('map');
  });

  /* ── Switch board ────────────────────────────────────── */
  async function switchBoard(board) {
    const key = board === 'map' ? `map_${mapSel.value}` : board;
    if (cache[key]) { renderBoard(cache[key], board); return; }

    renderLoading();
    try {
      const data = board === 'map'
        ? await API.getMapLeaderboard(mapSel.value)
        : await API.getLeaderboard(board);
      cache[key] = data.leaderboard || [];
      renderBoard(cache[key], board);
    } catch (err) {
      showError(err.message || 'Could not load leaderboard.');
    }
  }

  /* ── Loading ─────────────────────────────────────────── */
  function renderLoading() {
    content.innerHTML = '';
    content.innerHTML = `
      <div class="lb-loading">
        <div class="lb-spinner"></div>
        <span class="lb-loading-text">LOADING RANKINGS…</span>
      </div>`;
  }

  /* ── Render board ────────────────────────────────────── */
  function renderBoard(rows, board) {
    content.innerHTML = '';

    if (!rows || rows.length === 0) {
      content.innerHTML = `
        <div class="lb-empty">
          <span class="lb-empty__glyph">◎</span>
          <div class="lb-empty__title">NO PLAYERS YET</div>
          <div class="lb-empty__sub">Be the first to make it onto this board!</div>
        </div>`;
      return;
    }

    const cfg   = BOARDS[board] || BOARDS.kills;
    const top3  = rows.slice(0, 3);
    const rest  = rows.slice(3);
    let myRank  = null;

    /* Check if current player appears anywhere */
    rows.forEach(r => { if (_myName && r.name?.toLowerCase() === _myName) myRank = r.rank; });

    const wrap = document.createElement('div');
    wrap.style.animation = 'lb-fade-in 0.35s ease';

    /* ── Podium ── */
    if (top3.length > 0) {
      const podium = document.createElement('div');
      podium.className = 'lb-podium';

      /* Order: silver(2nd) · gold(1st) · bronze(3rd) via CSS order property */
      const medals = ['gold','silver','bronze'];
      top3.forEach((entry, i) => {
        const tier  = medals[i];
        const isMe  = _myName && entry.name?.toLowerCase() === _myName;
        const c     = charColor(entry.characterId);
        const card  = document.createElement('div');
        card.className = `lb-podium-card lb-podium-card--${tier}`;

        if (isMe) {
          const you = document.createElement('div');
          you.className = 'lb-podium-you';
          you.textContent = 'YOU';
          card.appendChild(you);
        }

        card.innerHTML += `
          <div class="lb-podium-medal">${i===0?'🥇':i===1?'🥈':'🥉'}</div>
          <div class="lb-podium-avatar lb-podium-avatar--${tier}"
               style="color:${c};border-color:${c}80;background:${c}15;box-shadow:0 0 16px ${c}30">
            ${charInitial(entry.characterId)}
          </div>
          <div class="lb-podium-info">
            <div class="lb-podium-name lb-podium-name--${tier}">${_esc(entry.name || '?')}</div>
            <div class="lb-podium-char">
              <span class="lb-podium-char-dot" style="background:${c};box-shadow:0 0 6px ${c}"></span>
              ${_esc(charLabel(entry.characterId))}
            </div>
          </div>
          <div class="lb-podium-value lb-podium-value--${tier}">${cfg.fmt(entry.value ?? 0)}</div>`;

        podium.appendChild(card);
      });
      wrap.appendChild(podium);
    }

    /* ── Rest of list ── */
    if (rest.length > 0) {
      const divider = document.createElement('div');
      divider.className = 'lb-divider';
      divider.innerHTML = `<div class="lb-divider__line"></div>
        <span class="lb-divider__label">RANKS 4 – ${rows.length}</span>
        <div class="lb-divider__line"></div>`;
      wrap.appendChild(divider);

      const header = document.createElement('div');
      header.className = 'lb-list-header';
      header.innerHTML = `<span>RANK</span><span>PLAYER</span><span>CHARACTER</span><span style="text-align:right">${cfg.col}</span>`;
      wrap.appendChild(header);

      const list = document.createElement('div');
      list.className = 'lb-list';

      rest.forEach((entry, i) => {
        const rank  = entry.rank;
        const isMe  = _myName && entry.name?.toLowerCase() === _myName;
        const c     = charColor(entry.characterId);

        const row = document.createElement('div');
        row.className = 'lb-row' +
          (rank <= 10 ? ' lb-row--top10' : '') +
          (isMe       ? ' lb-row--me'    : '');
        row.style.animationDelay = `${Math.min(i * 18, 400)}ms`;

        const rankEl = document.createElement('div');
        rankEl.className = 'lb-row__rank';
        rankEl.textContent = `#${rank}`;

        const nameEl = document.createElement('div');
        nameEl.className = 'lb-row__name';
        nameEl.innerHTML = `${_esc(entry.name || '?')}${isMe ? '<span class="lb-you-tag">YOU</span>' : ''}`;

        const charEl = document.createElement('div');
        charEl.className = 'lb-row__char';
        charEl.innerHTML = `<span class="lb-char-dot" style="background:${c};box-shadow:0 0 5px ${c}80"></span>${_esc(charLabel(entry.characterId))}`;

        const valEl = document.createElement('div');
        valEl.className = 'lb-row__val';
        valEl.textContent = cfg.fmt(entry.value ?? 0);

        row.appendChild(rankEl);
        row.appendChild(nameEl);
        row.appendChild(charEl);
        row.appendChild(valEl);
        list.appendChild(row);
      });
      wrap.appendChild(list);
    }

    /* ── Not ranked ── */
    if (_myName && !myRank) {
      const banner = document.createElement('div');
      banner.className = 'lb-not-ranked';
      banner.textContent = 'You are not in the top 50 yet. Keep playing to claim your rank!';
      wrap.appendChild(banner);
    }

    content.appendChild(wrap);
  }

  /* ── Error ───────────────────────────────────────────── */
  function showError(msg) {
    content.innerHTML = '';
    errorMsg.textContent = msg;
    errorEl.hidden = false;
  }
  retryBtn.addEventListener('click', () => {
    errorEl.hidden = true;
    const key = activeBoard === 'map' ? `map_${mapSel.value}` : activeBoard;
    cache[key] = null;
    switchBoard(activeBoard);
  });

  /* ── Escape ──────────────────────────────────────────── */
  function _esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Prefetch all boards in background ──────────────── */
  ['kills','waves','level','nex','campaign'].forEach(async type => {
    try {
      const data = await API.getLeaderboard(type);
      cache[type] = data.leaderboard || [];
      if (activeBoard === type) renderBoard(cache[type], type);
    } catch { /* silent */ }
  });

  /* ── Init ────────────────────────────────────────────── */
  switchBoard('kills');

  /* ══════════════════════════════════════════════════════════
     CUSTOM MAP DROPDOWN CONTROLLER
  ══════════════════════════════════════════════════════════ */
  (function initMapDropdown() {
    const dropdown = document.getElementById('mapDropdown');
    const trigger = document.getElementById('mapDropdownTrigger');
    const panel = document.getElementById('mapDropdownPanel');
    const backdrop = document.getElementById('mapDropdownBackdrop');
    const selectedText = document.getElementById('mapSelectedText');
    const searchInput = document.getElementById('mapSearchInput');
    const listContainer = document.getElementById('mapDropdownList');
    const emptyState = document.getElementById('mapDropdownEmpty');
    const hiddenSelect = document.getElementById('lbMapSelect');

    let isOpen = false;
    let focusedIndex = -1;

    // Get all items
    function getVisibleItems() {
      return Array.from(listContainer.querySelectorAll('.map-dropdown__item:not([hidden])'));
    }

    // Open dropdown
    function open() {
      if (isOpen) return;
      isOpen = true;
      dropdown.classList.add('open');
      trigger.setAttribute('aria-expanded', 'true');
      panel.setAttribute('aria-hidden', 'false');

      // Focus search input
      setTimeout(() => {
        searchInput.focus();
        searchInput.select();
      }, 100);

      // Prevent body scroll on mobile
      if (window.innerWidth <= 480) {
        document.body.style.overflow = 'hidden';
      }

      // Reset focus index
      focusedIndex = -1;
    }

    // Close dropdown
    function close() {
      if (!isOpen) return;
      isOpen = false;
      dropdown.classList.remove('open');
      trigger.setAttribute('aria-expanded', 'false');
      panel.setAttribute('aria-hidden', 'true');

      // Restore body scroll
      document.body.style.overflow = '';

      // Clear search
      searchInput.value = '';
      filterItems('');

      // Return focus to trigger
      trigger.focus();
    }

    // Toggle dropdown
    function toggle() {
      isOpen ? close() : open();
    }

    // Select item
    function selectItem(item) {
      const value = item.dataset.value;
      const name = item.querySelector('.map-dropdown__item-name').textContent;

      // Update visual selection
      listContainer.querySelectorAll('.map-dropdown__item').forEach(i => {
        i.classList.remove('selected');
        i.setAttribute('aria-selected', 'false');
      });
      item.classList.add('selected');
      item.setAttribute('aria-selected', 'true');

      // Update trigger text
      selectedText.textContent = name;

      // Update hidden select
      hiddenSelect.value = value;

      // Dispatch change event on hidden select
      const event = new Event('change', { bubbles: true });
      hiddenSelect.dispatchEvent(event);

      // Close dropdown
      close();
    }

    // Filter items by search
    function filterItems(query) {
      const q = query.toLowerCase().trim();
      let hasResults = false;

      listContainer.querySelectorAll('.map-dropdown__group').forEach(group => {
        let groupHasVisible = false;

        group.querySelectorAll('.map-dropdown__item').forEach(item => {
          const name = item.querySelector('.map-dropdown__item-name').textContent.toLowerCase();
          const matches = !q || name.includes(q);

          item.hidden = !matches;
          if (matches) {
            groupHasVisible = true;
            hasResults = true;
          }
        });

        // Hide group label if no items visible
        const label = group.querySelector('.map-dropdown__group-label');
        if (label) label.hidden = !groupHasVisible;
        group.hidden = !groupHasVisible;
      });

      // Show/hide empty state
      emptyState.hidden = hasResults;
      focusedIndex = -1;
    }

    // Keyboard navigation
    function handleKeydown(e) {
      const items = getVisibleItems();

      switch (e.key) {
        case 'ArrowDown':
          e.preventDefault();
          if (!isOpen) {
            open();
          } else {
            focusedIndex = Math.min(focusedIndex + 1, items.length - 1);
            items[focusedIndex]?.focus();
          }
          break;

        case 'ArrowUp':
          e.preventDefault();
          if (isOpen) {
            focusedIndex = Math.max(focusedIndex - 1, 0);
            items[focusedIndex]?.focus();
          }
          break;

        case 'Enter':
          if (isOpen && focusedIndex >= 0 && items[focusedIndex]) {
            e.preventDefault();
            selectItem(items[focusedIndex]);
          } else if (isOpen && document.activeElement === searchInput) {
            // Select first visible item
            const firstItem = items[0];
            if (firstItem) {
              e.preventDefault();
              selectItem(firstItem);
            }
          }
          break;

        case 'Escape':
          if (isOpen) {
            e.preventDefault();
            close();
          }
          break;

        case 'Tab':
          if (isOpen) {
            close();
          }
          break;

        case 'Home':
          if (isOpen) {
            e.preventDefault();
            focusedIndex = 0;
            items[0]?.focus();
          }
          break;

        case 'End':
          if (isOpen) {
            e.preventDefault();
            focusedIndex = items.length - 1;
            items[focusedIndex]?.focus();
          }
          break;
      }
    }

    // Event listeners
    trigger.addEventListener('click', toggle);
    trigger.addEventListener('keydown', handleKeydown);

    backdrop.addEventListener('click', close);

    searchInput.addEventListener('input', (e) => {
      filterItems(e.target.value);
    });

    searchInput.addEventListener('keydown', handleKeydown);

    listContainer.querySelectorAll('.map-dropdown__item').forEach(item => {
      item.addEventListener('click', () => selectItem(item));

      item.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          selectItem(item);
        } else {
          handleKeydown(e);
        }
      });

      // Track hover for keyboard/mouse coordination
      item.addEventListener('mouseenter', () => {
        const items = getVisibleItems();
        focusedIndex = items.indexOf(item);
      });
    });

    // Close on outside click
    document.addEventListener('click', (e) => {
      if (isOpen && !dropdown.contains(e.target)) {
        close();
      }
    });

    // Close on resize (mobile orientation change)
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        if (isOpen && window.innerWidth > 480) {
          // Reset body overflow if resized to desktop
          document.body.style.overflow = '';
        }
      }, 100);
    });

    // Scroll selected item into view when opening
    const scrollToSelected = () => {
      const selected = listContainer.querySelector('.map-dropdown__item.selected');
      if (selected) {
        setTimeout(() => {
          selected.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }, 150);
      }
    };

    trigger.addEventListener('click', scrollToSelected);
  })();
  </script>
</body>
</html>
