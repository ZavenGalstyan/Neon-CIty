<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DASH DREAD — Item Shop</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
  /* ═══════════════════════════════════════════════════════════
     ITEM SHOP — Premium self-contained styles
  ═══════════════════════════════════════════════════════════ */

  /* ── Ambient glow orbs ──────────────────────────────────── */
  .shop-page { position: relative; }
  .shop-page::before, .shop-page::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    filter: blur(120px);
  }
  .shop-page::before {
    width: 700px; height: 700px;
    top: -250px; right: -150px;
    background: radial-gradient(circle, rgba(255,68,102,0.14) 0%, transparent 65%);
    animation: shop-orb-a 20s ease-in-out infinite alternate;
  }
  .shop-page::after {
    width: 550px; height: 550px;
    bottom: -150px; left: -100px;
    background: radial-gradient(circle, rgba(68,238,255,0.1) 0%, transparent 65%);
    animation: shop-orb-b 25s ease-in-out infinite alternate;
  }
  @keyframes shop-orb-a {
    from { transform: translate(0,0) scale(1);     opacity: 0.8; }
    to   { transform: translate(-70px,80px) scale(1.2); opacity: 1; }
  }
  @keyframes shop-orb-b {
    from { transform: translate(0,0) scale(1);     opacity: 0.7; }
    to   { transform: translate(80px,-60px) scale(1.15); opacity: 1; }
  }

  /* ── Page wrap ──────────────────────────────────────────── */
  .shop-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 1340px;
    margin: 0 auto;
    padding: 0 32px 120px;
  }

  /* ── HEADER ─────────────────────────────────────────────── */
  .shop-header {
    position: relative;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 60px 0 44px;
    gap: 28px;
    overflow: hidden;
  }
  .shop-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,68,102,0.35) 30%,
                rgba(255,215,0,0.4) 60%, rgba(204,136,255,0.25) 85%, transparent 100%);
  }
  .shop-title { display: flex; flex-direction: column; gap: 12px; }
  .shop-title__main {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(34px, 5.5vw, 64px);
    font-weight: 900;
    letter-spacing: 0.07em;
    line-height: 1;
    background: linear-gradient(135deg, #ffffff 0%, #FFD700 30%, #FF4466 65%, #CC88FF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 40px rgba(255,68,102,0.25));
  }
  .shop-title__sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── BALANCE CHIP ───────────────────────────────────────── */
  .shop-balance {
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 26px;
    background: linear-gradient(135deg, rgba(255,215,0,0.07) 0%, rgba(255,215,0,0.03) 100%);
    border: 1px solid rgba(255,215,0,0.22);
    border-radius: 18px;
    box-shadow: 0 0 40px rgba(255,215,0,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
    flex-shrink: 0;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .shop-balance:hover {
    border-color: rgba(255,215,0,0.45);
    box-shadow: 0 0 60px rgba(255,215,0,0.14), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .shop-balance::before {
    content: '';
    position: absolute;
    top: -40%; left: -80%;
    width: 50%; height: 180%;
    background: linear-gradient(105deg, transparent, rgba(255,215,0,0.08), transparent);
    animation: balance-sweep 5s ease-in-out infinite;
  }
  @keyframes balance-sweep {
    0%,40% { left: -80%; }
    60%,100% { left: 180%; }
  }
  .shop-balance__icon {
    font-size: 30px;
    color: var(--gold);
    filter: drop-shadow(0 0 12px rgba(255,215,0,0.8));
    animation: nex-pulse 3s ease-in-out infinite;
    line-height: 1;
  }
  @keyframes nex-pulse {
    0%,100% { filter: drop-shadow(0 0 10px rgba(255,215,0,0.7)); }
    50%      { filter: drop-shadow(0 0 22px rgba(255,215,0,1)); }
  }
  .shop-balance__body { display: flex; flex-direction: column; gap: 4px; }
  .shop-balance__label {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .shop-balance__value {
    font-family: 'Orbitron', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.03em;
    line-height: 1;
    text-shadow: 0 0 24px rgba(255,215,0,0.55);
  }

  /* ── ERROR BANNER ───────────────────────────────────────── */
  .shop-error {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 0 0 28px;
    padding: 16px 24px;
    background: rgba(255,68,102,0.06);
    border: 1px solid rgba(255,68,102,0.22);
    border-radius: 14px;
    backdrop-filter: blur(12px);
  }
  .shop-error__msg {
    flex: 1;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    color: var(--pink);
    letter-spacing: 0.06em;
  }
  .shop-error__retry {
    padding: 9px 22px;
    background: rgba(255,68,102,0.1);
    border: 1px solid rgba(255,68,102,0.38);
    border-radius: 8px;
    color: var(--pink);
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .shop-error__retry:hover {
    background: rgba(255,68,102,0.2);
    box-shadow: 0 0 18px rgba(255,68,102,0.22);
  }

  /* ── TABS ───────────────────────────────────────────────── */
  .shop-tabs {
    display: flex;
    gap: 8px;
    padding: 30px 0 36px;
    border-bottom: none;
    flex-wrap: wrap;
  }
  .shop-tab {
    position: relative;
    padding: 11px 28px;
    background: rgba(255,255,255,0.035);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--muted);
    cursor: pointer;
    overflow: hidden;
    transition: color 0.22s, border-color 0.22s, background 0.22s, box-shadow 0.22s;
    white-space: nowrap;
  }
  .shop-tab::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 100px;
    background: radial-gradient(ellipse at 50% -20%, rgba(255,215,0,0.15), transparent 65%);
    opacity: 0;
    transition: opacity 0.22s;
    pointer-events: none;
  }
  .shop-tab:hover { color: var(--text); border-color: rgba(255,255,255,0.18); }
  .shop-tab:hover::before { opacity: 0.7; }
  .shop-tab.active {
    background: rgba(255,215,0,0.09);
    border-color: rgba(255,215,0,0.5);
    color: var(--gold);
    text-shadow: 0 0 14px rgba(255,215,0,0.65);
    box-shadow: 0 0 24px rgba(255,215,0,0.12), inset 0 0 20px rgba(255,215,0,0.05);
  }
  .shop-tab.active::before { opacity: 1; }

  /* ── ITEM GRID ──────────────────────────────────────────── */
  .shop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 22px;
    list-style: none;
    padding: 0;
    margin: 0;
  }

  /* ── CARD BASE ──────────────────────────────────────────── */
  .shop-card {
    position: relative;
    display: flex;
    flex-direction: column;
    background: rgba(10,10,22,0.72);
    border: 1px solid rgba(255,255,255,0.065);
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: transform 0.28s cubic-bezier(.22,.68,0,1.2),
                border-color 0.28s, box-shadow 0.28s;
    animation: card-appear 0.5s cubic-bezier(.22,.68,0,1.2) both;
  }
  @keyframes card-appear {
    from { opacity: 0; transform: translateY(22px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }
  .shop-card:nth-child(1)  { animation-delay:  0ms }
  .shop-card:nth-child(2)  { animation-delay: 55ms }
  .shop-card:nth-child(3)  { animation-delay:110ms }
  .shop-card:nth-child(4)  { animation-delay:165ms }
  .shop-card:nth-child(5)  { animation-delay:220ms }
  .shop-card:nth-child(6)  { animation-delay:275ms }
  .shop-card:nth-child(7)  { animation-delay:330ms }
  .shop-card:nth-child(8)  { animation-delay:385ms }
  .shop-card:nth-child(9)  { animation-delay:440ms }
  .shop-card:nth-child(10) { animation-delay:495ms }
  .shop-card:nth-child(11) { animation-delay:550ms }
  .shop-card:nth-child(12) { animation-delay:605ms }

  /* shimmer sweep on hover */
  .shop-card::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 55%; height: 100%;
    background: linear-gradient(105deg, transparent, rgba(255,255,255,0.028), transparent);
    pointer-events: none;
    z-index: 2;
    transition: none;
  }
  .shop-card:hover { transform: translateY(-6px); }
  .shop-card:hover::after {
    animation: card-sweep 0.55s ease forwards;
  }
  @keyframes card-sweep {
    from { left: -100%; }
    to   { left: 180%; }
  }
  .shop-card:hover {
    border-color: rgba(255,255,255,0.14);
    box-shadow: 0 20px 60px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04);
  }

  /* owned */
  .shop-card.owned {
    background: rgba(8,22,14,0.72);
    border-color: rgba(68,255,136,0.18);
  }
  .shop-card.owned:hover {
    border-color: rgba(68,255,136,0.42);
    box-shadow: 0 20px 60px rgba(0,0,0,0.45), 0 0 30px rgba(68,255,136,0.07);
  }

  /* ── ACCENT BAR ─────────────────────────────────────────── */
  .shop-card__accent {
    height: 3px;
    background: linear-gradient(90deg,
      var(--card-color, #FFD700) 0%,
      color-mix(in srgb, var(--card-color, #FFD700) 40%, transparent) 60%,
      transparent 100%);
    flex-shrink: 0;
  }

  /* ── CARD BODY ──────────────────────────────────────────── */
  .shop-card__body {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 24px 22px 18px;
    flex: 1;
  }

  /* ── ICON ───────────────────────────────────────────────── */
  .shop-card__icon {
    width: 54px; height: 54px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .shop-card__icon::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 35% 25%, rgba(255,255,255,0.1) 0%, transparent 55%);
    pointer-events: none;
  }
  .shop-card:hover .shop-card__icon {
    border-color: rgba(255,255,255,0.14);
    box-shadow: 0 0 16px rgba(255,255,255,0.04);
  }

  /* ── NAME ───────────────────────────────────────────────── */
  .shop-card__name {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.07em;
    color: #fff;
    line-height: 1.3;
  }

  /* ── DESC ───────────────────────────────────────────────── */
  .shop-card__desc {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    color: rgba(224,224,240,0.38);
    flex: 1;
  }

  /* ── STATS ──────────────────────────────────────────────── */
  .shop-card__stats {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .shop-card__stat {
    padding: 4px 11px;
    background: rgba(255,255,255,0.045);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 7px;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.5);
    transition: border-color 0.2s, color 0.2s;
  }
  .shop-card:hover .shop-card__stat {
    border-color: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.65);
  }

  /* ── FOOTER ─────────────────────────────────────────────── */
  .shop-card__footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 22px 20px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  /* ── PRICE ──────────────────────────────────────────────── */
  .shop-card__price {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'Orbitron', sans-serif;
    font-size: 17px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.03em;
    text-shadow: 0 0 16px rgba(255,215,0,0.45);
    line-height: 1;
  }
  .shop-card__price-icon {
    font-size: 14px;
    filter: drop-shadow(0 0 8px rgba(255,215,0,0.9));
  }
  .shop-card__price--free { color: var(--green); text-shadow: 0 0 16px rgba(68,255,136,0.45); }
  .shop-card__price--free .shop-card__price-icon { filter: drop-shadow(0 0 8px rgba(68,255,136,0.9)); }

  /* ── BUY / STATE BUTTONS ────────────────────────────────── */
  .shop-card__btn {
    position: relative;
    overflow: hidden;
    padding: 10px 22px;
    background: linear-gradient(135deg, rgba(255,215,0,0.13) 0%, rgba(255,215,0,0.06) 100%);
    border: 1px solid rgba(255,215,0,0.4);
    border-radius: 9px;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--gold);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
    box-shadow: 0 0 14px rgba(255,215,0,0.1);
  }
  .shop-card__btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -100%;
    width: 55%; height: 200%;
    background: linear-gradient(105deg, transparent, rgba(255,215,0,0.14), transparent);
    pointer-events: none;
  }
  .shop-card__btn:hover:not(:disabled)::before { animation: btn-sweep 0.45s ease forwards; }
  @keyframes btn-sweep {
    from { left: -100%; }
    to   { left: 200%; }
  }
  .shop-card__btn:hover:not(:disabled) {
    background: linear-gradient(135deg, rgba(255,215,0,0.24) 0%, rgba(255,215,0,0.12) 100%);
    border-color: rgba(255,215,0,0.75);
    box-shadow: 0 0 28px rgba(255,215,0,0.28);
    color: #ffe84a;
  }
  .shop-card__btn:active:not(:disabled) { transform: scale(0.96); }
  .shop-card__btn:disabled { cursor: default; }

  .shop-card__btn--owned {
    background: rgba(68,255,136,0.07);
    border-color: rgba(68,255,136,0.28);
    color: var(--green);
    box-shadow: 0 0 10px rgba(68,255,136,0.07);
    font-size: 8.5px;
    letter-spacing: 0.14em;
  }
  .shop-card__btn--equipped {
    background: rgba(68,238,255,0.07);
    border-color: rgba(68,238,255,0.32);
    color: var(--cyan);
    box-shadow: 0 0 12px rgba(68,238,255,0.1);
    font-size: 8.5px;
    letter-spacing: 0.14em;
  }
  .shop-card__btn--cant-afford { opacity: 0.32; filter: grayscale(0.5); }
  .shop-card__btn--loading     { opacity: 0.5; cursor: wait; }

  /* ── SKELETON ───────────────────────────────────────────── */
  .shop-card--skeleton {
    flex: unset; max-width: unset;
    height: 250px;
    background: rgba(255,255,255,0.022);
    border-color: rgba(255,255,255,0.04);
    animation: sk-breathe 2s ease-in-out infinite;
  }
  @keyframes sk-breathe {
    0%,100% { opacity: 0.45; }
    50%      { opacity: 0.8; }
  }

  /* ── EMPTY STATE ────────────────────────────────────────── */
  .shop-empty {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 90px 24px;
    text-align: center;
  }
  .shop-empty strong {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text);
  }
  .shop-empty small {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  /* ── LOGIN PROMPT ───────────────────────────────────────── */
  .shop-login-prompt {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    padding: 20px 26px;
    margin-top: 8px;
    background: rgba(68,238,255,0.04);
    border: 1px solid rgba(68,238,255,0.13);
    border-radius: 16px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.1em;
    flex-wrap: wrap;
    gap: 14px;
  }
  .shop-login-prompt__links { display: flex; gap: 10px; flex-wrap: wrap; }
  .shop-login-prompt__links a {
    padding: 9px 20px;
    border-radius: 9px;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-decoration: none;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .shop-login-prompt__links a:first-child {
    background: rgba(255,215,0,0.09);
    border: 1px solid rgba(255,215,0,0.3);
    color: var(--gold);
  }
  .shop-login-prompt__links a:first-child:hover {
    background: rgba(255,215,0,0.18);
    box-shadow: 0 0 20px rgba(255,215,0,0.2);
  }
  .shop-login-prompt__links a:last-child {
    background: rgba(68,238,255,0.07);
    border: 1px solid rgba(68,238,255,0.22);
    color: var(--cyan);
  }
  .shop-login-prompt__links a:last-child:hover {
    background: rgba(68,238,255,0.14);
    box-shadow: 0 0 20px rgba(68,238,255,0.15);
  }

  /* ── TOAST ──────────────────────────────────────────────── */
  .shop-toast {
    position: fixed;
    bottom: 34px; left: 50%;
    transform: translateX(-50%) translateY(18px);
    padding: 13px 30px;
    border-radius: 100px;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    opacity: 0;
    transition: opacity 0.28s, transform 0.28s;
    z-index: 9999;
    pointer-events: none;
    white-space: nowrap;
    backdrop-filter: blur(20px);
  }
  .shop-toast--visible { opacity: 1; transform: translateX(-50%) translateY(0); }
  .shop-toast--ok {
    background: rgba(68,255,136,0.1);
    border: 1px solid rgba(68,255,136,0.38);
    color: var(--green);
    box-shadow: 0 8px 36px rgba(68,255,136,0.15);
  }
  .shop-toast--err {
    background: rgba(255,68,102,0.1);
    border: 1px solid rgba(255,68,102,0.38);
    color: var(--pink);
    box-shadow: 0 8px 36px rgba(255,68,102,0.15);
  }

  /* ── MOBILE ─────────────────────────────────────────────── */
  @media (max-width: 720px) {
    .shop-wrap { padding: 0 18px 80px; }
    .shop-header { flex-direction: column; gap: 22px; padding: 36px 0 32px; }
    .shop-balance { align-self: stretch; justify-content: space-between; }
    .shop-tabs { gap: 6px; }
    .shop-tab  { padding: 9px 18px; font-size: 9px; }
    .shop-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
    .shop-card__body { padding: 18px 16px 14px; }
    .shop-card__footer { padding: 12px 16px 16px; }
  }
  @media (max-width: 430px) {
    .shop-grid { grid-template-columns: 1fr; }
  }
  </style>
</head>
<body class="select-screen shop-page">
  <div class="bg-grid"></div>
  <div class="scanlines"></div>

  <!-- ── Navbar ───────────────────────────────────────────── -->
  <nav class="site-nav">
    <a href="index.html" class="site-nav__logo"><span class="logo-dash">DASH</span><span class="logo-sep">✦</span><span class="logo-dread">DREAD</span></a>
    <div id="siteNav" class="site-nav__controls"></div>
  </nav>

  <!-- ── Page content ─────────────────────────────────────── -->
  <div class="shop-wrap">

    <!-- Header -->
    <header class="shop-header">
      <div class="shop-title">
        <span class="shop-title__main">ITEM SHOP</span>
        <span class="shop-title__sub">SPEND YOUR NEX · DOMINATE THE CITY</span>
      </div>

      <!-- NEX balance (skeleton → real value after fetch) -->
      <div class="shop-balance" aria-label="Your NEX balance">
        <span class="shop-balance__icon">⬢</span>
        <div class="shop-balance__body">
          <span class="shop-balance__label">YOUR BALANCE</span>
          <span class="shop-balance__value skeleton-text" id="shopBalanceEl">000,000</span>
        </div>
      </div>
    </header>

    <!-- Error banner (hidden by default) -->
    <div class="shop-error" id="shopErrorEl" hidden role="alert">
      <span class="shop-error__msg" id="shopErrorMsg"></span>
      <button class="shop-error__retry" id="shopRetryBtn">RETRY</button>
    </div>

    <!-- Tabs -->
    <nav class="shop-tabs" role="tablist" aria-label="Shop categories">
      <button class="shop-tab active" role="tab" aria-selected="true"  data-tab="characters">CHARACTERS</button>
      <button class="shop-tab"        role="tab" aria-selected="false" data-tab="weapons">WEAPONS</button>
      <button class="shop-tab"        role="tab" aria-selected="false" data-tab="upgrades">UPGRADES</button>
      <button class="shop-tab"        role="tab" aria-selected="false" data-tab="vehicles">VEHICLES</button>
    </nav>

    <!-- Item grid -->
    <main class="shop-grid" id="shopGridEl" role="list" aria-live="polite"></main>

  </div><!-- /.shop-wrap -->

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
  'use strict';

  Auth.mountNavbar();

  /* ════════════════════════════════════════════════════════════
     CATALOG — built from CONFIG, prices patched from server
  ════════════════════════════════════════════════════════════ */

  const CHAR_ICONS = {
    timebreaker:'⏱', ai_avatar:'🤖', overlord:'👑', electric_eel:'⚡',
    shadow_lord:'🌑', plasma_titan:'💥', quantum_ghost:'👻', omega_prime:'🔱',
  };

  const WEAPON_ICON = w =>
    w.melee              ? '🗡️' :
    w.special === 'fire'    ? '🔥' :
    w.special === 'rocket'  ? '🚀' :
    w.special === 'plasma'  ? '💜' :
    w.experimental          ? '🧪' : '🔫';

  /* Build display catalog from CONFIG (icons, colors, stats).
     Prices start from CONFIG and get overwritten by server catalog. */
  const CATALOG = {
    characters: CONFIG.CHARACTERS
      .filter(c => c.locked)
      .map(c => ({
        id:       c.id,
        name:     c.name,
        desc:     c.lore || '',
        price:    c.price || 10000,
        icon:     CHAR_ICONS[c.id] || '◈',
        color:    c.color || '#FFD700',
        stats:    [
          `SPD ${c.stats?.speed  ?? '?'}`,
          `HP ${c.stats?.health ?? '?'}`,
          `DMG ${c.stats?.damage ?? '?'}`,
        ],
        category: 'characters',
      })),

    weapons: CONFIG.WEAPONS
      .filter(w => w.price > 0)
      .map(w => ({
        id:       w.id,
        name:     w.name,
        desc:     w.desc || '',
        price:    w.price,
        icon:     WEAPON_ICON(w),
        color:    w.color || '#44EEFF',
        stats:    w.melee
          ? [`DMG ${w.damage}`, `RNG ${w.range}`]
          : [`DMG ${w.damage}`, `RPM ${Math.round(60000 / (w.fireRate || 1))}`],
        category: 'weapons',
      })),

    upgrades: CONFIG.UPGRADES.map(u => ({
      id:       u.id,
      name:     u.name,
      desc:     u.desc || '',
      price:    u.baseCost,
      icon:     u.icon || '◆',
      color:    u.color || '#44EEFF',
      stats:    [`MAX LV ${u.maxLevel}`],
      category: 'upgrades',
    })),

    vehicles: CONFIG.CAR_DEALERSHIP.map(v => ({
      id:       v.id,
      name:     v.name,
      desc:     v.desc || '',
      price:    v.price,
      icon:     '🚗',
      color:    v.color || '#CC3333',
      stats:    [`SPD ${v.speed}`, `HP ${v.hp}`],
      category: 'vehicles',
    })),
  };

  /**
   * Patch CATALOG prices with server-authoritative values from
   * GET /shop/catalog. Silently ignored if endpoint not ready.
   */
  async function applyServerPrices() {
    try {
      const serverCatalog = await API.getShopCatalog();
      (['characters', 'weapons', 'upgrades', 'vehicles']).forEach(cat => {
        const serverItems = serverCatalog[cat] ?? [];
        serverItems.forEach(serverItem => {
          const local = CATALOG[cat]?.find(i => i.id === serverItem.id);
          if (local && typeof serverItem.price === 'number') {
            local.price = serverItem.price; // trust server price
          }
        });
      });
    } catch {
      // Catalog endpoint not yet live — CONFIG prices are fine
    }
  }

  /* ════════════════════════════════════════════════════════════
     STATE
  ════════════════════════════════════════════════════════════ */

  const FREE_CHAR_IDS = new Set(CONFIG.CHARACTERS.filter(c => !c.locked).map(c => c.id));

  const state = {
    nex:          0,
    activeTab:    'characters',
    owned: {
      characters: new Set(FREE_CHAR_IDS),
      weapons:    new Set(['pistol']),
      upgrades:   new Set(),
      vehicles:   new Set(),
    },
    loading:      true,
    loadError:    null,
  };

  /* ════════════════════════════════════════════════════════════
     DOM REFS
  ════════════════════════════════════════════════════════════ */

  const balanceEl  = document.getElementById('shopBalanceEl');
  const errorEl    = document.getElementById('shopErrorEl');
  const errorMsgEl = document.getElementById('shopErrorMsg');
  const retryBtn   = document.getElementById('shopRetryBtn');
  const gridEl     = document.getElementById('shopGridEl');

  /* ════════════════════════════════════════════════════════════
     BALANCE — fetch + display (mirrors profile page pattern)
  ════════════════════════════════════════════════════════════ */

  async function loadBalance() {
    if (!Auth.isLoggedIn()) {
      balanceEl.classList.remove('skeleton-text');
      balanceEl.textContent = '—';
      return;
    }
    try {
      const data = await API.getNex();       // GET /nex/balance → { nex: Number }
      state.nex = data.nex ?? 0;
      balanceEl.classList.remove('skeleton-text');
      balanceEl.textContent = state.nex.toLocaleString();
    } catch {
      balanceEl.classList.remove('skeleton-text');
      balanceEl.textContent = '?';
    }
  }

  function updateBalanceDisplay() {
    balanceEl.textContent = state.nex.toLocaleString();
  }

  /* ════════════════════════════════════════════════════════════
     INVENTORY — fetch what the player already owns
  ════════════════════════════════════════════════════════════ */

  async function loadInventory() {
    if (!Auth.isLoggedIn()) return;
    try {
      // Try new unified endpoint first (GET /shop/inventory)
      let data;
      try {
        data = await API.getShopInventory();
      } catch {
        // Fallback: two separate calls
        const [profile, inv] = await Promise.all([API.getProfile(), API.getInventory()]);
        data = {
          nex:        profile.nex          ?? 0,
          characters: profile.unlockedCharacters ?? [],
          weapons:    inv.weapons          ?? [],
          upgrades:   inv.upgrades         ?? [],
          vehicles:   inv.vehicles         ?? [],
        };
      }

      // Merge into state (keep FREE_CHAR_IDS baseline)
      state.nex = data.nex ?? state.nex;
      state.owned.characters = new Set([...FREE_CHAR_IDS, ...(data.characters ?? [])]);
      state.owned.weapons    = new Set(['pistol',          ...(data.weapons   ?? [])]);
      state.owned.upgrades   = new Set(data.upgrades ?? []);
      state.owned.vehicles   = new Set(data.vehicles ?? []);

      updateBalanceDisplay();
    } catch (err) {
      throw err; // Let caller handle
    }
  }

  /* ════════════════════════════════════════════════════════════
     RENDER
  ════════════════════════════════════════════════════════════ */

  function isOwned(item) {
    return state.owned[item.category]?.has(item.id) ?? false;
  }

  function renderSkeletons(count = 8) {
    gridEl.innerHTML = Array.from({ length: count }, () =>
      '<div class="shop-card shop-card--skeleton" aria-hidden="true"></div>'
    ).join('');
  }

  function renderGrid() {
    const items     = CATALOG[state.activeTab] ?? [];
    const loggedIn  = Auth.isLoggedIn();
    gridEl.innerHTML = '';

    if (items.length === 0) {
      gridEl.innerHTML = '<p class="shop-empty">Nothing here yet.</p>';
      return;
    }

    // Show login prompt once at end if guest
    const fragment = document.createDocumentFragment();
    items.forEach(item => fragment.appendChild(buildCard(item, loggedIn)));

    if (!loggedIn) {
      const prompt = buildLoginPrompt();
      fragment.appendChild(prompt);
    }

    gridEl.appendChild(fragment);
  }

  function buildCard(item, loggedIn) {
    const owned      = isOwned(item);
    const canAfford  = state.nex >= item.price;

    const card = document.createElement('article');
    card.className  = `shop-card${owned ? ' owned' : ''}`;
    card.setAttribute('role', 'listitem');
    card.style.setProperty('--card-color', item.color);

    /* Accent bar */
    const accent = document.createElement('div');
    accent.className = 'shop-card__accent';

    /* Body */
    const body = document.createElement('div');
    body.className = 'shop-card__body';

    const iconEl = document.createElement('div');
    iconEl.className = 'shop-card__icon';
    iconEl.textContent = item.icon;

    const nameEl = document.createElement('h3');
    nameEl.className = 'shop-card__name';
    nameEl.textContent = item.name;

    const descEl = document.createElement('p');
    descEl.className = 'shop-card__desc';
    descEl.textContent = item.desc;

    const statsEl = document.createElement('div');
    statsEl.className = 'shop-card__stats';
    item.stats.forEach(s => {
      const span = document.createElement('span');
      span.className = 'shop-card__stat';
      span.textContent = s;
      statsEl.appendChild(span);
    });

    body.append(iconEl, nameEl, descEl, statsEl);

    /* Footer */
    const footer = document.createElement('div');
    footer.className = 'shop-card__footer';

    const priceEl = document.createElement('div');
    priceEl.className = `shop-card__price${item.price === 0 ? ' shop-card__price--free' : ''}`;

    const priceIcon = document.createElement('span');
    priceIcon.className = 'shop-card__price-icon';
    priceIcon.textContent = '⬢';

    const priceNum = document.createElement('span');
    priceNum.textContent = item.price === 0 ? 'FREE' : item.price.toLocaleString();
    if (item.price === 0) priceIcon.hidden = true;

    priceEl.append(priceIcon, priceNum);

    const btn = document.createElement('button');
    btn.className = 'shop-card__btn';

    if (owned) {
      btn.classList.add('shop-card__btn--owned');
      btn.textContent = 'OWNED';
      btn.disabled    = true;
    } else if (!loggedIn) {
      btn.textContent = 'BUY';
      btn.disabled    = true;
      btn.title       = 'Login to buy';
    } else {
      btn.textContent      = 'BUY';
      btn.dataset.price    = item.price;   // used by refreshAffordability
      btn.dataset.itemId   = item.id;
      btn.dataset.category = item.category;
      if (!canAfford) btn.classList.add('shop-card__btn--cant-afford');
      btn.addEventListener('click', () => handleBuy(item, card, btn, priceNum));
    }

    footer.append(priceEl, btn);
    card.append(accent, body, footer);
    return card;
  }

  function buildLoginPrompt() {
    const div = document.createElement('div');
    div.className = 'shop-login-prompt';
    div.innerHTML = `
      <span>Login to purchase items and save your progress.</span>
      <div class="shop-login-prompt__links">
        <a href="login.html">LOGIN</a>
        <a href="register.html">REGISTER</a>
      </div>`;
    return div;
  }

  /* ════════════════════════════════════════════════════════════
     BUY
  ════════════════════════════════════════════════════════════ */

  async function handleBuy(item, card, btn, _priceEl) {
    if (!Auth.isLoggedIn()) { showToast('Login to buy items.', true); return; }
    if (state.nex < item.price) { showToast('Not enough NEX.', true); return; }

    btn.disabled = true;
    btn.classList.add('shop-card__btn--loading');
    btn.textContent = '…';

    try {
      let newNex = state.nex - item.price; // optimistic fallback

      // Try unified /shop/buy first, fall back to legacy endpoints
      try {
        const res = await API.shopBuy(item.id, item.category);
        newNex = res.nexBalance ?? newNex;
      } catch (shopErr) {
        if (_isEndpointMissing(shopErr)) {
          newNex = await _legacyBuy(item);
        } else {
          throw shopErr;
        }
      }

      // Update state
      state.nex = newNex;
      state.owned[item.category]?.add(item.id);

      // Update balance chip
      updateBalanceDisplay();

      // Update card to owned state
      card.classList.add('owned');
      btn.classList.remove('shop-card__btn--cant-afford', 'shop-card__btn--loading');
      btn.classList.add('shop-card__btn--owned');
      btn.textContent = 'OWNED';
      btn.disabled    = true;

      showToast(`${item.name} unlocked!`, false);
      refreshAffordability();

    } catch (err) {
      btn.disabled = false;
      btn.classList.remove('shop-card__btn--loading');
      btn.textContent = 'BUY';
      showToast(err.message || 'Purchase failed.', true);
    }
  }

  async function _legacyBuy(item) {
    let newNex = state.nex - item.price;
    if (item.category === 'characters') {
      const res = await API.unlockCharacter(item.id);
      newNex = res.nexBalance ?? newNex;
    } else {
      const res = await API.spendNex(item.price, `${item.category}_buy`, item.id);
      newNex = res.nex ?? newNex;
      if (item.category === 'weapons')  await API.addWeapon(item.id);
      if (item.category === 'upgrades') await API.addUpgrade(item.id);
      if (item.category === 'vehicles') await API.addVehicle(item.id);
    }
    return newNex;
  }

  /**
   * Returns true when the error means the endpoint doesn't exist yet.
   * Matches: HTTP 404, or backend error keys ITEM_NOT_FOUND / NOT_FOUND.
   */
  function _isEndpointMissing(err) {
    return (
      err.message?.includes('404') ||
      err.message === 'NOT_FOUND'  ||
      err.message === 'ITEM_NOT_FOUND'
    );
  }

  function refreshAffordability() {
    gridEl.querySelectorAll('.shop-card__btn:not(.shop-card__btn--owned)').forEach(btn => {
      const card  = btn.closest('.shop-card');
      if (!card) return;
      const price = parseInt(btn.dataset.price ?? '0', 10);
      btn.classList.toggle('shop-card__btn--cant-afford', state.nex < price);
    });
  }

  /* ════════════════════════════════════════════════════════════
     TAB SWITCHING
  ════════════════════════════════════════════════════════════ */

  document.querySelectorAll('.shop-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.shop-tab').forEach(t => {
        t.classList.remove('active');
        t.setAttribute('aria-selected', 'false');
      });
      tab.classList.add('active');
      tab.setAttribute('aria-selected', 'true');
      state.activeTab = tab.dataset.tab;
      renderGrid();
    });
  });

  /* ════════════════════════════════════════════════════════════
     ERROR + RETRY
  ════════════════════════════════════════════════════════════ */

  function showError(msg) {
    errorMsgEl.textContent = msg;
    errorEl.hidden = false;
  }

  function hideError() {
    errorEl.hidden = true;
  }

  retryBtn.addEventListener('click', () => {
    hideError();
    init();
  });

  /* ════════════════════════════════════════════════════════════
     TOAST
  ════════════════════════════════════════════════════════════ */

  let _toastTimer = null;
  function showToast(msg, isErr) {
    document.querySelectorAll('.shop-toast').forEach(t => t.remove());
    clearTimeout(_toastTimer);
    const toast = document.createElement('div');
    toast.className = `shop-toast shop-toast--${isErr ? 'err' : 'ok'}`;
    toast.textContent = msg;
    document.body.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('shop-toast--visible'));
    _toastTimer = setTimeout(() => {
      toast.classList.remove('shop-toast--visible');
      setTimeout(() => toast.remove(), 350);
    }, 2800);
  }

  /* ════════════════════════════════════════════════════════════
     INIT
  ════════════════════════════════════════════════════════════ */

  async function init() {
    renderSkeletons(8);
    hideError();

    // Show skeleton balance immediately while data loads
    balanceEl.classList.add('skeleton-text');
    balanceEl.textContent = '000,000';

    try {
      // Run all three fetches in parallel:
      //   1. GET /nex/balance         — balance chip
      //   2. GET /shop/inventory      — owned items (with fallback)
      //   3. GET /shop/catalog        — server-authoritative prices (silently optional)
      await Promise.all([
        loadBalance(),
        loadInventory(),
        applyServerPrices(),
      ]);
    } catch (err) {
      showError(err.message || 'Could not load shop data. Check your connection.');
    }

    renderGrid();
  }

  init();
  </script>
</body>
</html>
