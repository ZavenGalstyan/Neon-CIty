<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON CITY — Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="select-screen auth-screen">
  <div class="bg-grid"></div>
  <div class="scanlines"></div>

  <!-- ── Site Navbar ───────────────────────────────────────── -->
  <nav class="site-nav">
    <a href="index.html" class="site-nav__logo">NEON CITY</a>
    <div id="siteNav" class="site-nav__controls"></div>
  </nav>

  <!-- ── Auth Card ─────────────────────────────────────────── -->
  <div class="auth-wrap">
    <div class="auth-card">

      <div class="auth-card__header">
        <div class="auth-card__icon">◈</div>
        <h2 class="auth-card__title">CREATE ACCOUNT</h2>
        <p class="auth-card__sub">Join the city. Choose your identity.</p>
      </div>

      <!-- Success / error banner -->
      <div id="authBanner" class="auth-banner" aria-live="polite" hidden></div>

      <form id="registerForm" class="auth-form" novalidate>

        <div class="auth-field">
          <label class="auth-label" for="regName">USERNAME</label>
          <input class="auth-input" type="text" id="regName" name="name"
                 placeholder="PlayerOne" autocomplete="username" required>
          <span class="auth-field-err" id="errName"></span>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="regEmail">EMAIL</label>
          <input class="auth-input" type="email" id="regEmail" name="email"
                 placeholder="player@example.com" autocomplete="email" required>
          <span class="auth-field-err" id="errEmail"></span>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="regPassword">PASSWORD</label>
          <div class="auth-input-wrap">
            <input class="auth-input" type="password" id="regPassword" name="password"
                   placeholder="••••••••" autocomplete="new-password" required minlength="6">
            <button type="button" class="auth-toggle-pw" aria-label="Toggle password" data-target="regPassword">◉</button>
          </div>
          <span class="auth-field-err" id="errPassword"></span>
        </div>

        <button type="submit" class="auth-submit" id="regSubmit">
          <span id="regBtnText">CREATE ACCOUNT</span>
          <span id="regBtnSpinner" class="auth-spinner" hidden></span>
        </button>

      </form>

      <p class="auth-switch">
        Already have an account? <a href="login.html" class="auth-link">LOGIN</a>
      </p>

    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    Auth.mountNavbar();

    /* ── Password visibility toggle ──────────────────────── */
    document.querySelectorAll('.auth-toggle-pw').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        input.type = input.type === 'password' ? 'text' : 'password';
        btn.textContent = input.type === 'password' ? '◉' : '◎';
      });
    });

    /* ── Form validation helpers ─────────────────────────── */
    function setFieldError(id, msg) {
      const el = document.getElementById(id);
      if (el) el.textContent = msg;
    }
    function clearFieldErrors() {
      ['errName', 'errEmail', 'errPassword'].forEach(id => setFieldError(id, ''));
    }
    function showBanner(msg, isError = true) {
      const b = document.getElementById('authBanner');
      b.textContent = msg;
      b.className = `auth-banner ${isError ? 'auth-banner--error' : 'auth-banner--success'}`;
      b.hidden = false;
    }

    /* ── Submit ──────────────────────────────────────────── */
    document.getElementById('registerForm').addEventListener('submit', async e => {
      e.preventDefault();
      clearFieldErrors();

      const name     = document.getElementById('regName').value.trim();
      const email    = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;

      // Client-side validation
      let valid = true;
      if (!name)               { setFieldError('errName',     'Username is required.'); valid = false; }
      if (!email)              { setFieldError('errEmail',    'Email is required.');    valid = false; }
      if (password.length < 6) { setFieldError('errPassword', 'Min 6 characters.');    valid = false; }
      if (!valid) return;

      const btn     = document.getElementById('regSubmit');
      const btnText = document.getElementById('regBtnText');
      const spinner = document.getElementById('regBtnSpinner');

      btn.disabled  = true;
      btnText.hidden  = true;
      spinner.hidden  = false;

      try {
        await Auth.register({ name, email, password });
        // Show success, then navigate to login after a short delay
        spinner.hidden = true;
        btnText.hidden = false;
        btnText.textContent = '✓ REGISTERED';
        btn.style.background = 'var(--green)';
        showBanner('Account created! Redirecting to login…', false);
        setTimeout(() => { window.location.href = 'login.html?registered=1'; }, 1600);
      } catch (err) {
        showBanner(err.message || 'Registration failed. Please try again.');
        btn.disabled    = false;
        btnText.hidden  = false;
        spinner.hidden  = true;
      }
    });
  </script>
</body>
</html>
