<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#06060e">
  <title>DASH DREAD</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="game-body">

  <!-- Loading screen -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-title"><span class="logo-dash">DASH</span> <span class="logo-dread">DREAD</span></div>
    <div class="loading-bar-wrap">
      <div class="loading-bar-fill"></div>
    </div>
  </div>

  <!-- Game canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- Fullscreen toggle button -->
  <button id="fsBtn" aria-label="Toggle fullscreen">
    <svg id="fsIconExpand" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 8V3H8M16 3H21V8M21 16V21H16M8 21H3V16" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg id="fsIconCompress" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
      <path d="M8 3V8H3M21 8H16V3M3 16H8V21M16 21V16H21" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <!-- Mobile touch controls (shown on touch devices) -->
  <div id="touchControls">
    <!-- Left: virtual joystick -->
    <div id="joystickZone">
      <div id="joystickKnob"></div>
    </div>
    <!-- Right: action buttons -->
    <div id="touchButtons">
      <!-- Row 1 -->
      <button class="touch-btn btn-enter"  id="tbEnter"  >E</button>
      <button class="touch-btn btn-sprint" id="tbSprint" >⇧</button>
      <!-- Row 2: big fire button spanning both cols -->
      <button class="touch-btn btn-fire"   id="tbFire"   >🔥</button>
      <!-- Row 3 -->
      <button class="touch-btn btn-gren"   id="tbGren"   >G</button>
      <button class="touch-btn btn-car"    id="tbCar"    >F</button>
    </div>
  </div>

  <!-- roundRect polyfill for older browsers -->
  <script>
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        this.moveTo(x + r, y);
        this.lineTo(x + w - r, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r);
        this.lineTo(x + w, y + h - r);
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        this.lineTo(x + r, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r);
        this.lineTo(x, y + r);
        this.quadraticCurveTo(x, y, x + r, y);
        this.closePath();
      };
    }
  </script>

  <!-- Scripts (load order: data → utils → core → entities → systems) -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ws.js"></script>
  <script src="js/multiplayer.js"></script>
  <script src="js/systems/audio.js"></script>
  <script src="js/core/input.js"></script>
  <script src="js/core/map.js"></script>
  <script src="js/entities/entities.js"></script>
  <script src="js/systems/ui.js"></script>
  <script src="js/systems/shop.js"></script>
  <script src="js/core/game.js"></script>
  <script src="js/core/game-tower.js"></script>
  <script src="js/core/game-furniture.js"></script>
  <script src="js/core/game-metro.js"></script>
  <script src="js/core/game-dealer.js"></script>
  <script src="js/core/game-render.js"></script>

  <script>
    // Show touch controls on touch devices
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
      const tc = document.getElementById('touchControls');
      if (tc) tc.classList.add('active');

      // Lazy input lookup — works regardless of when the game initialises
      function getInput() {
        return window._gameInstance && window._gameInstance.input;
      }

      const btnMap = [
        ['tbEnter',  'KeyE'],
        ['tbSprint', 'ShiftLeft'],
        ['tbGren',   'KeyG'],
        ['tbCar',    'KeyF'],
      ];
      btnMap.forEach(([id, code]) => {
        const btn = document.getElementById(id);
        if (!btn) return;
        btn.addEventListener('touchstart', e => { const inp = getInput(); if (inp) inp._virtualKeys.add(code);    e.preventDefault(); }, { passive: false });
        btn.addEventListener('touchend',   e => { const inp = getInput(); if (inp) inp._virtualKeys.delete(code); e.preventDefault(); }, { passive: false });
      });

      const fbtn = document.getElementById('tbFire');
      if (fbtn) {
        fbtn.addEventListener('touchstart', e => { const inp = getInput(); if (inp) { inp.mouseDown = true; inp.mouseJustDown = true; } e.preventDefault(); }, { passive: false });
        fbtn.addEventListener('touchend',   e => { const inp = getInput(); if (inp) inp.mouseDown = false; e.preventDefault(); }, { passive: false });
      }
    }

    // ── Fullscreen toggle ──────────────────────────────────────
    (function () {
      const btn          = document.getElementById('fsBtn');
      const iconExpand   = document.getElementById('fsIconExpand');
      const iconCompress = document.getElementById('fsIconCompress');
      const el           = document.documentElement; // <html> — most reliable cross-browser

      // iOS Safari does not support the Fullscreen API; detect it separately
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      // Standalone = opened via "Add to Home Screen" → already truly fullscreen
      const isStandalone = navigator.standalone === true ||
                           window.matchMedia('(display-mode: standalone)').matches;

      function isFS() {
        return !!(document.fullscreenElement ||
                  document.webkitFullscreenElement ||
                  document.msFullscreenElement);
      }

      function lockOrientation() {
        try {
          if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
          }
        } catch (_) {}
      }

      function unlockOrientation() {
        try {
          if (screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock();
          }
        } catch (_) {}
      }

      function iosScrollHide() {
        // Trick the iOS browser into hiding its chrome by scrolling 1px
        document.body.style.minHeight = (window.screen.height + 1) + 'px';
        setTimeout(() => {
          window.scrollTo(0, 1);
          document.body.style.minHeight = '';
        }, 80);
      }

      function enter() {
        if (el.requestFullscreen) {
          el.requestFullscreen({ navigationUI: 'hide' })
            .then(lockOrientation)
            .catch(() => {});
        } else if (el.webkitRequestFullscreen) {
          el.webkitRequestFullscreen();
          lockOrientation();
        } else if (el.msRequestFullscreen) {
          el.msRequestFullscreen();
        } else if (isIOS) {
          // iOS fallback: scroll to hide address bar + show compress icon manually
          iosScrollHide();
          iconExpand.style.display   = 'none';
          iconCompress.style.display = 'block';
          lockOrientation();
        }
      }

      function exit() {
        if (document.exitFullscreen) {
          document.exitFullscreen().then(unlockOrientation).catch(() => {});
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
          unlockOrientation();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        } else if (isIOS) {
          // iOS fallback: scroll back to top
          window.scrollTo(0, 0);
          iconExpand.style.display   = 'block';
          iconCompress.style.display = 'none';
          unlockOrientation();
        }
      }

      function updateIcon() {
        const fs = isFS();
        iconExpand.style.display   = fs ? 'none'  : 'block';
        iconCompress.style.display = fs ? 'block' : 'none';
      }

      // If launched as PWA (standalone), reflect that in the icon immediately
      if (isStandalone) {
        iconExpand.style.display   = 'none';
        iconCompress.style.display = 'block';
        btn.style.display = 'none'; // already fullscreen — hide the button
      }

      // touchend fires immediately (no 300ms delay); flag prevents the ghost click
      let _fsTouchFired = false;
      btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        _fsTouchFired = true;
        isFS() ? exit() : enter();
        setTimeout(() => { _fsTouchFired = false; }, 600);
      });
      btn.addEventListener('click', () => { if (!_fsTouchFired) { isFS() ? exit() : enter(); } });

      document.addEventListener('fullscreenchange',       updateIcon);
      document.addEventListener('webkitfullscreenchange', updateIcon);
      document.addEventListener('MSFullscreenChange',     updateIcon);
    })();

    // Hide loading overlay after short delay, then start game
    window.addEventListener('load', () => {
      setTimeout(() => {
        const overlay = document.getElementById('loadingOverlay');
        overlay.classList.add('hidden');

        // Load selected character from localStorage
        let charData = null;
        try { charData = JSON.parse(localStorage.getItem('selectedChar')); } catch (e) {}
        if (!charData) charData = CONFIG.CHARACTERS[0];

        // Load selected map from localStorage
        let mapData = null;
        try { mapData = JSON.parse(localStorage.getItem('selectedMap')); } catch (e) {}
        if (!mapData) mapData = CONFIG.MAPS[0];

        // Multiplayer: read roomId from URL query params
        const _urlP   = new URLSearchParams(window.location.search);
        const _roomId = _urlP.get('roomId');
        const _isHost = _urlP.get('host') === '1';
        if (_roomId) {
          window._mpRoomId = _roomId;
          window._mpIsHost = _isHost;

          // Pre-populate remotePlayers from the room list saved in localStorage
          if (typeof Multiplayer !== 'undefined') {
            try {
              const saved = JSON.parse(localStorage.getItem('mpRoomPlayers') || '[]');
              const map   = Multiplayer.getRemotePlayers();
              saved.forEach(p => {
                map.set(p.userId, {
                  x: 0, y: 0, targetX: 0, targetY: 0,
                  angle: 0,
                  hp:    p.hp    || 100,
                  maxHp: p.maxHp || 100,
                  username: p.username || 'PLAYER',
                  charId:   p.charId   || 'gangster',
                  dead: false
                });
              });
            } catch (_) {}
            localStorage.removeItem('mpRoomPlayers');
          }

          // Connect WebSocket and send room:rejoin once connected
          // This is CRITICAL — the old WS from index.html closed on navigation.
          // Backend still has the room linked to the dead socket.
          // We must tell it "I'm back, re-associate me with my room".
          if (typeof WS !== 'undefined' && Auth.isLoggedIn()) {
            WS.connect();
            // Wait for WS to open, then send rejoin
            WS.on('connected', function _onReconnected() {
              WS.send('room:rejoin', { roomId: _roomId });
              WS.off('connected', _onReconnected);
            });
          }
        }

        window.startGame(charData, mapData);
      }, 900);
    });
  </script>
</body>
</html>
