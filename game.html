<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DASH DREAD</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="game-body">

  <!-- Loading screen -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-title"><span class="logo-dash">DASH</span> <span class="logo-dread">DREAD</span></div>
    <div class="loading-bar-wrap">
      <div class="loading-bar-fill"></div>
    </div>
  </div>

  <!-- Game canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- Fullscreen toggle button -->
  <button id="fsBtn" aria-label="Toggle fullscreen">
    <svg id="fsIconExpand" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 8V3H8M16 3H21V8M21 16V21H16M8 21H3V16" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg id="fsIconCompress" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
      <path d="M8 3V8H3M21 8H16V3M3 16H8V21M16 21V16H21" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <!-- Mobile touch controls (shown on touch devices) -->
  <div id="touchControls">
    <!-- Left: virtual joystick -->
    <div id="joystickZone">
      <div id="joystickKnob"></div>
    </div>
    <!-- Right: action buttons -->
    <div id="touchButtons">
      <!-- Row 1 -->
      <button class="touch-btn btn-enter"  id="tbEnter"  >E</button>
      <button class="touch-btn btn-sprint" id="tbSprint" >⇧</button>
      <!-- Row 2: big fire button spanning both cols -->
      <button class="touch-btn btn-fire"   id="tbFire"   >🔥</button>
      <!-- Row 3 -->
      <button class="touch-btn btn-gren"   id="tbGren"   >G</button>
      <button class="touch-btn btn-car"    id="tbCar"    >F</button>
    </div>
  </div>

  <!-- roundRect polyfill for older browsers -->
  <script>
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        this.moveTo(x + r, y);
        this.lineTo(x + w - r, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r);
        this.lineTo(x + w, y + h - r);
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        this.lineTo(x + r, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r);
        this.lineTo(x, y + r);
        this.quadraticCurveTo(x, y, x + r, y);
        this.closePath();
      };
    }
  </script>

  <!-- Scripts (load order: data → utils → core → entities → systems) -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/systems/audio.js"></script>
  <script src="js/core/input.js"></script>
  <script src="js/core/map.js"></script>
  <script src="js/entities/entities.js"></script>
  <script src="js/systems/ui.js"></script>
  <script src="js/systems/shop.js"></script>
  <script src="js/core/game.js"></script>

  <script>
    // Show touch controls on touch devices
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
      const tc = document.getElementById('touchControls');
      if (tc) tc.classList.add('active');

      // Wire action buttons to virtual key injection (after InputManager is created)
      window.addEventListener('gameStarted', () => {
        const input = window._gameInstance && window._gameInstance.input;
        if (!input) return;
        const btnMap = [
          ['tbEnter',  'KeyE'],
          ['tbSprint', 'ShiftLeft'],
          ['tbGren',   'KeyG'],
          ['tbCar',    'KeyF'],
        ];
        btnMap.forEach(([id, code]) => {
          const btn = document.getElementById(id);
          if (!btn) return;
          btn.addEventListener('touchstart', e => { input._virtualKeys.add(code); e.preventDefault(); }, { passive:false });
          btn.addEventListener('touchend',   e => { input._virtualKeys.delete(code); e.preventDefault(); }, { passive:false });
        });
        // Fire button: mouseDown simulation
        const fbtn = document.getElementById('tbFire');
        if (fbtn) {
          fbtn.addEventListener('touchstart', e => { input.mouseDown = true; input.mouseJustDown = true; e.preventDefault(); }, { passive:false });
          fbtn.addEventListener('touchend',   e => { input.mouseDown = false; e.preventDefault(); }, { passive:false });
        }
      });
    }

    // ── Fullscreen toggle ──────────────────────────────────────
    (function () {
      const btn          = document.getElementById('fsBtn');
      const iconExpand   = document.getElementById('fsIconExpand');
      const iconCompress = document.getElementById('fsIconCompress');
      const el           = document.body;

      function isFS() {
        return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
      }

      function enter() {
        if      (el.requestFullscreen)       el.requestFullscreen({ navigationUI: 'hide' });
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        else if (el.msRequestFullscreen)     el.msRequestFullscreen();
      }

      function exit() {
        if      (document.exitFullscreen)       document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if (document.msExitFullscreen)     document.msExitFullscreen();
      }

      function updateIcon() {
        const fs = isFS();
        iconExpand.style.display   = fs ? 'none'  : 'block';
        iconCompress.style.display = fs ? 'block' : 'none';
      }

      btn.addEventListener('click', () => { isFS() ? exit() : enter(); });
      document.addEventListener('fullscreenchange',       updateIcon);
      document.addEventListener('webkitfullscreenchange', updateIcon);
      document.addEventListener('MSFullscreenChange',     updateIcon);
    })();

    // Hide loading overlay after short delay, then start game
    window.addEventListener('load', () => {
      setTimeout(() => {
        const overlay = document.getElementById('loadingOverlay');
        overlay.classList.add('hidden');

        // Load selected character from localStorage
        let charData = null;
        try { charData = JSON.parse(localStorage.getItem('selectedChar')); } catch (e) {}
        if (!charData) charData = CONFIG.CHARACTERS[0];

        // Load selected map from localStorage
        let mapData = null;
        try { mapData = JSON.parse(localStorage.getItem('selectedMap')); } catch (e) {}
        if (!mapData) mapData = CONFIG.MAPS[0];

        window.startGame(charData, mapData);
      }, 900);
    });
  </script>
</body>
</html>
